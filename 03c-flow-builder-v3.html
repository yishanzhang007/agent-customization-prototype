<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Option 3 v3 · Conditional Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Design tokens — pulled from Figma file SNFtqZ9mxLPdxL6ZtKVEWX */
      --fg-primary: #21201d;
      --fg-tertiary: #8e8c88;
      --fg-disabled: #bcbbb7;
      --fg-link: #1260c6;
      --bg-surface-primary: #ffffff;
      --bg-surface-secondary: #f8f8f7;
      --bg-inverted: #32302c;
      --fg-inverted: #fcfcfc;
      --border-default: rgba(33, 32, 29, 0.2);
      --border-header: rgba(33, 32, 29, 0.15);
      --neutral-10: #82807c;
      --muted: #8e8c88;
      --font-stack: 'Denim-TRIAL', 'Inter', system-ui, sans-serif;
    }
    body { font-family: var(--font-stack); font-weight: 400; }
    *, input, textarea, select, button { font-family: var(--font-stack); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    input, textarea, select { font-weight: 400; }
    button { font-weight: 500; }
    button * { font-weight: inherit; }
    textarea::placeholder, input::placeholder { color: var(--muted); opacity: 1; }
    textarea::-webkit-input-placeholder, input::-webkit-input-placeholder { color: var(--muted); opacity: 1; }
    textarea::-moz-placeholder, input::-moz-placeholder { color: var(--muted); opacity: 1; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 3px; }
    .flow-node { cursor: pointer; }
    .flow-node.firing .card-shell { animation: pulse 1.2s ease-in-out infinite; box-shadow: 0 0 0 3px #fbbf24, 0 8px 24px -8px rgba(0,0,0,0.2); }
    @keyframes pulse { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }

    /* Card UI — matches Figma 6483-2594 */
    .card-shell {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 16px 10px 12px;
      width: 232px;
      /* Use the same radius for default, hover, and selected so the corner doesn't morph mid-click. */
      border-radius: 16px;
      background: transparent;
      position: relative;
      box-shadow: 0 0 0 rgba(0,0,0,0);
      /* Hover/color transition only — radius and padding are now constant across states. */
      transition:
        background-color 160ms ease,
        box-shadow 160ms ease;
    }
    .card-shell.no-bg { background: transparent; }
    .flow-node:hover .card-shell,
    .card-shell.is-selected {
      background: #ffffff;
      box-shadow: 0 2px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.08);
    }
    .card-shell.is-selected .card-icon {
      border-width: 1px;
      border-color: currentColor;
    }
    /* Start (Incoming call) node — non-interactive, regular-weight title */
    .start-node { cursor: default; }
    .start-node:hover .card-shell { background: transparent !important; box-shadow: none !important; }
    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 0.5px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-icon svg { width: 18px; height: 18px; }
    .card-text { display: flex; flex-direction: column; gap: 2px; justify-content: center; min-width: 0; }
    .card-title {
      font-size: 16px;
      line-height: 20px;
      color: #21201d;
      font-weight: 400;
      white-space: nowrap;
    }
    .card-title.title-accent-schedule { color: #2972c3; }
    .card-title.title-accent-message  { color: #6a3cdf; }
    .card-title.title-accent-transfer { color: #24a8a4; }
    .card-subtitle {
      font-size: 14px;
      line-height: 18px;
      color: #8e8c88;
      white-space: nowrap;
    }
    .card-dot {
      position: absolute;
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #177E1D;
      top: 8px;
      left: 43px;
      box-shadow: 0 0 0 2px white;
    }
    /* Add-intent button — same card-shell hover treatment, but visually distinct (dashed icon) */
    .add-intent-trigger {
      display: block;
      background: transparent;
      border: 0;
      padding: 0;
      margin: 0;
      text-align: left;
      font-family: inherit;
      cursor: pointer;
      appearance: none;
    }
    .add-intent-trigger .card-icon {
      border-style: dashed;
      border-width: 1px;
      border-color: rgba(33,32,29,0.25);
      color: #8e8c88;
      background: transparent;
      transition: border-color 160ms ease, color 160ms ease, background-color 160ms ease;
    }
    .add-intent-trigger .card-title { color: #8e8c88; transition: color 160ms ease; }
    .add-intent-trigger:hover .card-icon { border-color: rgba(33,32,29,0.5); color: #21201d; background: white; }
    .add-intent-trigger:hover .card-title { color: #21201d; }
    .add-intent-trigger:active .card-shell { transform: scale(0.98); }
    .add-intent-trigger .card-shell { transition:
        background-color 160ms ease,
        box-shadow 160ms ease,
        transform 120ms ease; }
    .side-panel { transition: transform 0.2s ease; }
    .side-panel.hidden { transform: translateX(100%); }

    /* Custom checkbox — matches Figma: 16px filled dark square with white check */
    .intake-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 1px solid rgba(33,32,29,0.3);
      border-radius: 3px;
      background: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease;
      flex-shrink: 0;
    }
    .intake-checkbox:hover:not(:disabled) { border-color: #21201d; }
    .intake-checkbox:checked {
      background: #21201d;
      border-color: #21201d;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='3.5 8.5 6.5 11.5 12.5 5'/></svg>");
      background-size: 14px 14px;
      background-position: center;
      background-repeat: no-repeat;
    }
    .intake-checkbox:disabled { cursor: not-allowed; opacity: 0.6; }
    .test-drawer { transition: transform 0.25s ease; }
    .test-drawer.collapsed { transform: translateY(calc(100% - 56px)); }
    .action-option { transition: all 0.12s; }
    .action-option:hover { background: #f5f5f4; }
    .action-option.selected { background: #1c1917; color: white; }
    .action-option.selected .opt-icon { background: rgba(255,255,255,0.1); }
    .action-option.selected .opt-desc { color: rgba(255,255,255,0.7); }
    /* Dropdown entrance — user-initiated, ease-out for a snappy settle */
    .add-dropdown { animation: dropIn 180ms cubic-bezier(0.215, 0.61, 0.355, 1); transform-origin: top left; }
    @keyframes dropIn { from { opacity: 0; transform: translateY(-6px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
    /* Capability warning card */
    .warning-card { animation: slideIn 220ms cubic-bezier(0.215, 0.61, 0.355, 1); }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-4px) } to { opacity: 1; transform: translateY(0) } }
    /* Preview side panel — canvas-rendered AudioOrb ported from comms/web/src/components/openai-realtime/AudioOrb.tsx */
    .blob-canvas {
      width: 269px;
      height: 250px;
      pointer-events: none;
      display: block;
    }

    /* The preview panel sits at z-50 (above the editor's z-40). A regular
       box-shadow with a 28px blur bleeds in ALL directions — including
       ~24px to the right of its right edge. With the editor flush at the
       right, that bleed lands ON TOP of the editor (z-50 > z-40) and shows
       up as a dark seam. To get a true "shadow only on the left" we drop the
       box-shadow when both panels are open and draw the shadow as a
       ::before-positioned gradient strip immediately to the LEFT of the
       panel. Right side stays clean. */
    .preview-panel.left-shadow-only { box-shadow: none !important; }
    .preview-panel.left-shadow-only::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      right: 100%;
      width: 32px;
      background: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,0.06) 100%);
      pointer-events: none;
    }

    /* Mic button — sits at the base of the blob with a white halo ring */
    .preview-mic {
      position: relative;
      margin-top: -28px;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: #21201d;
      color: white;
      border: 4px solid white;
      box-sizing: content-box;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 160ms ease, transform 100ms ease, box-shadow 160ms ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      z-index: 5;
    }
    .preview-mic:hover  { transform: scale(1.04); }
    .preview-mic:active { transform: scale(0.96); }
    .preview-panel.recording .preview-mic {
      background: #b22e2b;
      animation: micPulse 1.3s ease-in-out infinite;
    }
    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(178,46,43,0.55), 0 2px 8px rgba(0,0,0,0.12); }
      70%      { box-shadow: 0 0 0 16px rgba(178,46,43,0), 0 2px 8px rgba(0,0,0,0.12); }
    }

    @media (prefers-reduced-motion: reduce) {
      .preview-mic { animation: none !important; }
    }

    /* Disconnect button — appears at the midpoint of a connection line on hover. */
    .disconnect-btn {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: white;
      border: 1px solid #e7e5e4;
      color: #57534e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 120ms ease, transform 120ms ease, background-color 120ms ease, border-color 120ms ease, color 120ms ease;
      pointer-events: none;
      z-index: 12;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.04);
    }
    .disconnect-btn.show { opacity: 1; pointer-events: auto; }
    .disconnect-btn:hover {
      background: #fef2f2;
      border-color: #fca5a5;
      color: #dc2626;
      transform: scale(1.08);
    }
    /* Promote the canvas to a composited layer only during active pan/zoom.
       At idle the layer is dropped so text/SVG re-rasterize crisp at the
       current scale instead of bitmap-scaling a 1x snapshot. */
    #canvas-transform.interacting { will-change: transform; }
    @media (prefers-reduced-motion: reduce) {
      .card-shell, .add-intent-trigger .card-shell, .add-intent-trigger .card-icon, .add-intent-trigger .card-title { transition: none; }
      .add-dropdown { animation: none; }
    }
  </style>
</head>
<body class="bg-stone-50 h-screen overflow-hidden">

  <div class="h-14 bg-white flex items-center justify-between pl-5 pr-4 relative z-30">
    <div class="flex items-center gap-3 flex-1 min-w-0">
      <a href="index.html" class="text-base font-medium text-[#21201d] hover:text-stone-700 leading-5">Agent customization</a>
      <span class="text-base text-[var(--muted)] leading-5">/</span>
      <div class="relative -ml-2">
        <button id="mode-trigger" class="flex items-center gap-1.5 px-2 py-1 rounded-md hover:bg-stone-100 text-base font-medium text-[#21201d] leading-5 transition">
          <span id="mode-trigger-label">Business hours</span>
          <span id="live-badge" class="inline-flex items-center gap-1 h-5 px-1.5 text-xs font-normal leading-5" style="background: #EAF1EA; color: #21201D; border-radius: 4px">
            <span class="w-1.5 h-1.5 rounded-full" style="background: #177E1D"></span>
            Live
          </span>
          <svg width="12" height="12" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" class="text-[var(--muted)]"><polyline points="208 96 128 176 48 96"/></svg>
        </button>
        <span id="mode-trigger-dot" class="hidden"></span>
        <div id="mode-menu" class="hidden add-dropdown absolute left-0 mt-1.5 w-72 bg-white border border-stone-200 rounded-xl shadow-lg z-40 overflow-hidden">
          <div class="px-3 py-2 border-b border-stone-100"><div class="text-[11px] font-medium text-stone-400 uppercase tracking-widest">Time blocks</div></div>
          <div id="mode-options" class="py-1 max-h-72 overflow-y-auto scrollbar-thin"></div>
          <div class="border-t border-stone-100 py-1">
            <button id="add-time-block" class="w-full text-left px-3 py-2.5 hover:bg-stone-50 flex items-center gap-2.5 text-stone-900">
              <span class="w-5 h-5 rounded border border-dashed border-stone-400 flex items-center justify-center text-xs leading-none">+</span>
              <div><div class="text-sm font-medium">Add time block…</div><div class="text-xs text-stone-500">Override the agent's behavior in a window</div></div>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button id="preview-btn" class="h-9 text-sm font-medium text-[#21201d] hover:bg-stone-100 px-3 rounded-md transition leading-5">Preview</button>
      <button id="publish-btn" disabled class="h-9 text-sm font-medium bg-stone-100 text-stone-400 px-3 rounded-md cursor-not-allowed leading-5">Publish</button>
      <span id="draft-pill" class="hidden"></span>
      <button id="open-test" class="hidden"></button>
      <button onclick="resetToDefaults()" class="hidden"></button>
    </div>
  </div>

  <div class="flex h-[calc(100vh-56px)] relative">

    <div class="flex-1 relative overflow-hidden cursor-grab select-none" id="canvas-viewport" style="background: #ffffff;">
      <div id="canvas-transform" class="absolute top-0 left-0" style="width: 1300px; height: 900px; transform-origin: 0 0; transform: translate(0px, 0px) scale(1);">
        <svg id="canvas-svg" class="absolute top-0 left-0 pointer-events-none" style="width: 1700px; height: 900px"></svg>
        <div id="canvas-nodes" class="relative" style="width: 1700px; height: 900px"></div>
      </div>

      <div class="absolute bottom-6 left-6 bg-white border border-stone-200 rounded-lg shadow-sm flex items-center divide-x divide-stone-100 z-10">
        <button id="zoom-out" class="px-3 py-2 text-sm text-[var(--muted)] hover:bg-stone-50">−</button>
        <button id="zoom-reset" class="px-3 py-2 text-sm text-[var(--muted)] min-w-[58px]" title="Reset zoom"><span id="zoom-pct">100%</span></button>
        <button id="zoom-in" class="px-3 py-2 text-sm text-[var(--muted)] hover:bg-stone-50">+</button>
      </div>
    </div>

    <!-- Preview side panel — voice agent preview with animated blob. Matches Figma 6576-3317. -->
    <div id="preview-panel" class="preview-panel hidden fixed top-0 bottom-0 w-[400px] bg-[var(--bg-surface-primary)] border-l z-50 flex flex-col" style="right: 0; border-left-width: 0.5px; border-left-color: var(--border-header); box-shadow: -4px 0 28px rgba(0,0,0,0.06); transition: right 0.2s ease">
      <div class="h-[60px] flex items-center justify-between pl-4 pr-3 border-b shrink-0" style="border-bottom-width: 0.5px; border-bottom-color: var(--border-default)">
        <span class="text-[16px] font-medium leading-5" style="color: var(--fg-primary)">Preview</span>
        <button id="preview-close" class="w-7 h-7 rounded-md flex items-center justify-center text-[var(--fg-tertiary)] hover:text-[var(--fg-primary)] hover:bg-stone-100 transition shrink-0">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>
        </button>
      </div>
      <div class="flex-1 flex flex-col items-center justify-center px-5 py-4 relative">
        <div id="preview-label" class="text-sm font-medium tabular-nums leading-[18px] mb-3" style="color: var(--fg-primary)">Click to start talking</div>
        <canvas id="preview-blob-canvas" class="blob-canvas" width="269" height="250" aria-hidden="true"></canvas>
        <button id="preview-mic" class="preview-mic" aria-label="Tap to talk">
          <svg width="18" height="18" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
            <rect x="88" y="24" width="80" height="144" rx="40"/>
            <path d="M200 128a72 72 0 01-144 0"/>
            <line x1="128" y1="200" x2="128" y2="232"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="side-panel" class="side-panel hidden fixed top-0 bottom-0 right-0 w-[400px] bg-[var(--bg-surface-primary)] border-l z-40 flex flex-col" style="border-left-width: 0.5px; border-left-color: var(--border-header); box-shadow: -4px 0 28px rgba(0,0,0,0.06)">
      <!-- Header — matches Figma 4:5323 -->
      <div class="h-[60px] flex items-center justify-between pl-4 pr-3 border-b shrink-0" style="border-bottom-width: 0.5px; border-bottom-color: var(--border-default)">
        <div id="panel-title" class="relative flex items-center gap-1.5 min-w-0">
          <span id="panel-intent-name" class="text-[16px] font-medium leading-5 text-[var(--fg-primary)]">—</span>
          <span id="panel-action-sep" class="hidden w-[2px] h-[2px] rounded-sm bg-[var(--fg-tertiary)] shrink-0"></span>
          <button id="panel-action-trigger" type="button" class="hidden items-center gap-1.5 rounded px-1 -mx-1 py-0.5 hover:bg-stone-100 transition cursor-pointer">
            <span id="panel-action-label" class="text-[16px] font-medium leading-5 text-[var(--fg-primary)]"></span>
            <svg id="panel-caret" class="shrink-0" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" style="color: var(--fg-primary)"><polyline points="2.5 3.75 5 6.25 7.5 3.75"/></svg>
          </button>
          <!-- Action-type menu (AI call / Human transfer) -->
          <div id="panel-action-menu" class="hidden absolute left-0 top-9 w-56 rounded-md shadow-lg z-30 overflow-hidden" style="background: var(--bg-surface-primary); border: 0.5px solid var(--border-default)">
            <button type="button" data-action-type="message" class="action-menu-option w-full text-left px-3 py-2 text-sm leading-[18px] hover:bg-stone-50" style="color: var(--fg-primary)">AI call</button>
            <button type="button" data-action-type="transfer" class="action-menu-option w-full text-left px-3 py-2 text-sm leading-[18px] hover:bg-stone-50" style="color: var(--fg-primary); border-top: 0.5px solid var(--border-default)">Human transfer</button>
          </div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <button id="panel-preview-btn" class="hidden h-9 inline-flex items-center gap-1.5 px-3 py-2 rounded-md border text-sm font-medium leading-[18px] text-[var(--fg-primary)] hover:bg-stone-50 transition" style="border-width: 0.5px; border-color: var(--border-default)">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <rect x="2.5" y="6.5" width="1" height="3" rx="0.5" fill="currentColor"/>
              <rect x="5" y="4.5" width="1" height="7" rx="0.5" fill="currentColor"/>
              <rect x="7.5" y="3" width="1" height="10" rx="0.5" fill="currentColor"/>
              <rect x="10" y="4.5" width="1" height="7" rx="0.5" fill="currentColor"/>
              <rect x="12.5" y="6.5" width="1" height="3" rx="0.5" fill="currentColor"/>
            </svg>
            Preview
          </button>
          <button id="panel-close" class="w-7 h-7 rounded-md flex items-center justify-center text-[var(--fg-tertiary)] hover:text-[var(--fg-primary)] hover:bg-stone-100 transition shrink-0">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="3" x2="11" y2="11"/><line x1="11" y1="3" x2="3" y2="11"/></svg>
          </button>
        </div>
      </div>
      <div id="panel-body" class="flex-1 overflow-y-auto scrollbar-thin"></div>
      <!-- Footer — matches Figma 4:5434 -->
      <div id="panel-footer" class="flex items-center justify-end gap-2 pl-5 pr-3 py-3 shrink-0" style="height: 56px">
        <button id="panel-cancel" class="hidden"></button>
        <button id="panel-delete" class="hidden"></button>
        <button id="panel-discard" class="inline-flex items-center h-9 px-3 py-2 text-sm font-medium leading-[18px] text-[var(--fg-disabled)] rounded-md cursor-not-allowed transition" disabled>Discard</button>
        <button id="panel-save" class="inline-flex items-center h-9 px-3 py-2 text-sm font-medium leading-[18px] bg-[var(--fg-disabled)] text-[var(--fg-inverted)] rounded-md cursor-not-allowed transition" disabled>Save</button>
      </div>
    </div>

    <div id="test-drawer" class="test-drawer collapsed hidden absolute bottom-0 left-0 right-0 bg-white border-t border-stone-200 shadow-xl z-30 h-96">
      <button id="test-toggle" class="w-full h-14 px-6 flex items-center justify-between border-b border-stone-100 hover:bg-stone-50">
        <div class="flex items-center gap-3">
          <span class="w-2 h-2 rounded-full bg-red-500"></span>
          <span class="text-sm font-medium text-stone-900">Test flow</span>
          <span class="text-xs text-stone-500">Run a sample call through the active mode</span>
        </div>
        <span id="test-toggle-icon" class="text-stone-400">▴</span>
      </button>
      <div class="grid h-[calc(100%-56px)]" style="grid-template-columns: 220px 1fr">
        <!-- Intent picker -->
        <div class="border-r border-stone-100 p-4 overflow-y-auto scrollbar-thin flex flex-col">
          <div class="text-xs font-medium text-stone-400 uppercase tracking-widest mb-2">Testing intent</div>
          <div id="test-intent-picker" class="space-y-1"></div>
          <div class="mt-auto pt-4 space-y-2">
            <button id="test-show-prompt" class="text-xs text-stone-500 hover:text-stone-900 block">View composed prompt →</button>
            <button id="test-reset" class="text-xs text-stone-500 hover:text-stone-900 block">Reset conversation</button>
          </div>
        </div>
        <!-- Chat panel -->
        <div class="flex flex-col h-full min-h-0">
          <div id="test-transcript" class="flex-1 overflow-y-auto scrollbar-thin p-4 space-y-3"></div>
          <form id="test-input-form" class="border-t border-stone-100 p-3 flex gap-2">
            <input id="test-input" type="text" placeholder="Type as the caller…" autocomplete="off"
              class="flex-1 px-3 py-2 text-sm border border-stone-200 rounded-md focus:outline-none focus:border-stone-400" />
            <button type="submit" class="text-sm bg-stone-900 text-white px-4 py-2 rounded-md hover:bg-stone-800">Send</button>
          </form>
        </div>
      </div>
    </div>

  </div>

  <script>
    const ACTION_KINDS = {
      message:  { label: 'Take a message',  headerLabel: 'AI call',   desc: 'Capture the caller’s request and route to the right inbox', iconSvg: 'envelopeOpen', iconColor: '#6a3cdf' },
      transfer: { label: 'Transfer call',   headerLabel: 'Transfer',  desc: 'Hand the caller to a phone number',                          iconSvg: 'phone',        iconColor: '#24a8a4' },
      // Schedule kept for backwards-compat with older saved intents but hidden from the picker
      // (requires EHR integration we don't ship in v1).
      schedule: { label: 'Schedule appointment', headerLabel: 'Schedule', desc: 'Book directly into the EHR', iconSvg: 'lightning', iconColor: '#2972c3', requiresEhr: true, hidden: true },
    };

    // EHR integration gate — when off, Schedule is disabled
    const EHR_INTEGRATION_ENABLED = true;

    // Inbox keys mirror PrimaryInboxSchema in
    // server/api/src/modules/conversation/conversation.types.ts:121
    const INBOX_LABELS = {
      front_desk:    'Front desk',
      billing:       'Billing',
      clinical_team: 'Clinical team',
    };
    const inboxLabel = (key) => INBOX_LABELS[key] || key || 'Front desk';

    // Upper bound on the free-text instructions a clinic can write per intent.
    // Telemetry hook: log per-clinic prompt length distribution + frequency of edits.
    const PROMPT_LIMIT = 500;

    // ============================================================
    // Capability warning list — "things v1 can't do" surfaced in the
    // Additional instructions textarea. Single warning category: inform-only,
    // dismiss-until-prose-changes, never blocks save. Owned by PM; items come
    // off the list as capabilities ship.
    // ============================================================
    const CAPABILITIES = [
      {
        id: 'books_appointments',
        match: /\b(book|schedule|reschedule|cancel|set up|put on the calendar|arrange).*(appointment|visit|follow-?up|consult)|book a follow-?up\b/i,
        issue: "The agent can't book, schedule, or cancel appointments.",
        fallback: "Booking requests will be captured as a message and sent to the inbox below.",
      },
      {
        id: 'lookup_records',
        match: /\b(look ?up|pull ?up|check|read|access|find).*(record|chart|ehr|prescription|history|lab result|labs?)\b/i,
        issue: "The agent can't access patient records, prescriptions, or lab results.",
        fallback: "It'll collect what the caller is asking about and pass it along as a message.",
      },
      {
        id: 'gives_medical_advice',
        match: /\b(recommend|suggest|advise|tell them to take|dosage|what dose|diagnose|prescrib|medical advice|side effect.{0,30}(should|ought to))\b/i,
        issue: "The agent never gives medical advice, recommends doses, or suggests treatment.",
        fallback: "Clinical questions will be captured as a message routed to the clinical team.",
      },
      {
        id: 'verify_insurance',
        match: /\b(verify|check|confirm).*(insurance|coverage|eligibility|benefits)|in[- ]?network/i,
        issue: "The agent can't verify insurance or eligibility.",
        fallback: "It'll note the caller's insurance question and pass it to the billing inbox.",
      },
      {
        id: 'outbound_message',
        match: /\b(text|sms|email|message them|send.*(text|sms|email|confirmation)|reply with)\b/i,
        issue: "The agent can't send texts or emails to callers.",
        fallback: "It only takes a message during the call — follow-ups happen through your existing channels.",
      },
      {
        id: 'outbound_call',
        match: /\b(call them back|outbound call|dial|return their call|callback.*(automatically|right away))\b/i,
        issue: "The agent can't make outbound calls.",
        fallback: "Callback requests will be captured in the message so staff can follow up.",
      },
      {
        id: 'transfer_call',
        match: /\b(transfer|connect them|patch them|forward.*(call|caller)|put them through)\b/i,
        issue: "This intent is set to take a message — it doesn't transfer the call.",
        fallback: "To route to a person, switch the action above to Transfer.",
      },
      {
        id: 'promises_outcomes',
        match: /\b(promise|guarantee).*(turnaround|by tomorrow|within|approve|refund|specific time)|promise.*prior auth/i,
        issue: "The agent shouldn't promise specific outcomes (approval timing, callback windows, refund amounts).",
        fallback: "It can collect the question and let staff respond with specifics later.",
      },
      {
        id: 'payments',
        match: /\b(charge|refund|process.*(payment|card)|take their card|payment plan)\b/i,
        issue: "The agent can't process payments, refunds, or take card information.",
        fallback: "Payment requests will be routed to the billing inbox for staff follow-up.",
      },
    ];

    function classifyProse(text) {
      if (!text || !text.trim()) return [];
      return CAPABILITIES.filter(c => c.match.test(text));
    }
    function hashProse(text) {
      let h = 0;
      for (let i = 0; i < text.length; i++) h = ((h << 5) - h + text.charCodeAt(i)) | 0;
      return String(h);
    }
    // intentId → Set of dismissed prose hashes (session-scoped, not persisted)
    const dismissedHashes = new Map();

    // Reusable per-clinic intake field library. Each field can be added to any intent's collect list.
    // In production: a clinic_intake_fields table seeded with defaults; clinics can add custom ones.
    const FIELD_LIBRARY = {
      caller_name:             { label: 'Full name',                    type: 'text'   },
      callback_number:         { label: 'Call back number',             type: 'phone'  },
      dob:                     { label: 'Date of birth',                type: 'date'   },
      patient_relation:        { label: 'Patient or proxy?',            type: 'choice' },
      reason_brief:            { label: 'Brief reason for call',        type: 'text'   },
      preferred_callback_time: { label: 'Preferred callback time',      type: 'text'   },
      urgency:                 { label: 'Urgency level',                type: 'choice' },
      pharmacy_name:           { label: 'Pharmacy',                     type: 'text'   },
      medication:              { label: 'Medication name',              type: 'text'   },
      account_number:          { label: 'Account number',               type: 'text'   },
      symptom:                 { label: 'Symptom description',          type: 'text'   },
      study_interest:          { label: "Which study they're asking about", type: 'text' },
    };

    // Per-intent default collect lists — seeded based on what each intent typically needs.
    const DEFAULT_COLLECT = {
      sched:    [['caller_name',true],['callback_number',true],['preferred_callback_time',false],['reason_brief',false]],
      refill:   [['caller_name',true],['dob',true],['pharmacy_name',true],['medication',false]],
      billing:  [['caller_name',true],['callback_number',true],['dob',false],['account_number',false]],
      clinical: [['caller_name',true],['callback_number',true],['dob',true],['symptom',true],['urgency',true]],
      trial:    [['caller_name',true],['callback_number',true],['study_interest',false]],
    };

    // Realistic knowledge sources surfaced in each intent's "Knowledge source"
    // section. Each entry mirrors a doc set a clinic would actually point the
    // agent at — accepted insurance plans, FAQs, clinic hours, etc. The agent
    // pulls answers from these when the caller asks something it can answer
    // directly (vs. taking a message).
    const DEFAULT_KNOWLEDGE = {
      billing:  'Accepted insurance plans, payment plans & policies, billing FAQ, EOB explanations',
      clinical: 'Clinic medical FAQ, common discharge instructions, escalation triggers, provider on-call schedule',
      general:  'Hours of operation, location & directions, provider bios & specialties, services offered',
      // Custom intents (created via "Add custom intent") — fall through to a sensible default
      _default: 'Clinic FAQ, hours & location, provider directory',
    };

    // Intents mirror the 5 canonical intents defined in
    // server/api/src/modules/agent/transfer-intent-guide.ts (scheduling, billing,
    // medication, clinical, general). Trigger examples are pulled verbatim from
    // the "Positive" examples in that guide so the prototype mirrors what the
    // model actually classifies on.
    const FLOWS = {
      business: {
        label: "Business hours · Mon–Fri 9am–5pm",
        intents: [
          { id: 'urgent',     name: 'Urgent',     examples: ['this is urgent', "I'm having chest pain", 'I need help right now'], action: { type: 'transfer', targets: ['(415) 555-0911'] } },
          { id: 'scheduling', name: 'Scheduling', examples: ['I need to book an appointment', 'Can I reschedule my Tuesday visit?', 'Cancel my Friday appointment'], action: { type: 'transfer', targets: ['(415) 555-0142'] } },
          { id: 'billing',    name: 'Billing',    examples: ["I got a bill I don't understand", 'Set up a payment plan', 'Did my insurance cover the lab work?'], action: { type: 'message',  prompt: 'Collect: caller name, account/MRN if they have it, callback number, and a brief description of the billing question.', inbox: 'billing' } },
          { id: 'clinical',   name: 'Clinical',   examples: ['I want to talk to a nurse about my labs', 'I have a question about my discharge instructions', "I'm having side effects from a new med"], action: { type: 'message',  prompt: 'Collect: name, DOB, what symptom or question they have, and urgency. Flag urgent if they mention chest pain, shortness of breath, or any other emergency signs.', inbox: 'clinical_team' } },
          { id: 'general',    name: 'General',    examples: ['Can I speak to someone?', 'Just put me through to the office'], action: { type: 'message',  prompt: 'Take down the caller name, callback number, and what they need.', inbox: 'front_desk' } },
          { id: 'talk_human', name: 'Talk to human', examples: ['Can I talk to a real person?', "I don't want to talk to a robot", 'Get me a human'], action: { type: 'transfer', targets: ['(415) 555-0100'] } },
        ],
      },
      afterhours: {
        label: "After hours · Weeknights + weekends",
        intents: [
          { id: 'urgent',     name: 'Urgent',     examples: ['this is urgent', "I'm having chest pain", 'I need help right now'], action: { type: 'transfer', targets: ['(415) 555-0911', '(415) 555-0912'] } },
          { id: 'scheduling', name: 'Scheduling', examples: ['I need to book an appointment'], action: { type: 'message', prompt: 'Note down what the caller wants to schedule — scheduling will call back in the morning.', inbox: 'front_desk' }, overridden: true },
          { id: 'billing',    name: 'Billing',    examples: ["I got a bill I don't understand"], action: { type: 'message', prompt: 'Take down the caller name and callback number.', inbox: 'billing' } },
          { id: 'clinical',   name: 'Clinical',   examples: ['I want to talk to a nurse about my labs'], action: { type: 'transfer', targets: ['(415) 555-0911'] }, overridden: true },
          { id: 'general',    name: 'General',    examples: ['Can I speak to someone?'], action: { type: 'message', prompt: 'Capture the caller name, callback number, and reason — someone will follow up in the morning.', inbox: 'front_desk' } },
          { id: 'talk_human', name: 'Talk to human', examples: ['Can I talk to a real person?', "I don't want to talk to a robot", 'Get me a human'], action: { type: 'transfer', targets: ['(415) 555-0911'] } },
        ],
      },
    };

    // Seed each message action with structured intake fields (per-intent defaults).
    Object.values(FLOWS).forEach(flow => {
      flow.intents.forEach(intent => {
        if (intent.action.type === 'message' && !intent.action.collect) {
          const seed = DEFAULT_COLLECT[intent.id] || [['caller_name', true], ['callback_number', true]];
          intent.action.collect = seed.map(([key, required]) => ({ key, required }));
        }
      });
    });


    // Welcome message — directly editable text, applied to every call.
    const welcomeState = {
      text: "Thanks for calling Sterling Family Care. How may I help you today?",
      _defaultText: "Thanks for calling Sterling Family Care. How may I help you today?",
    };

    function currentWelcomeText() {
      return welcomeState.text || '(write a welcome message)';
    }

    // Seed each message action's _defaultPrompt so we can detect customization
    // later (prompt !== _defaultPrompt → user touched it). Only set if missing
    // (so a hydrated state from localStorage keeps its original default).
    Object.values(FLOWS).forEach(flow => {
      flow.intents.forEach(intent => {
        if (intent.action.type === 'message' && intent.action._defaultPrompt === undefined) {
          intent.action._defaultPrompt = intent.action.prompt || '';
        }
      });
    });

    // ============================================================
    // Local persistence — survives page refresh
    // ============================================================
    const STORAGE_KEY = 'agent-cust-v3-state-v1';

    // Hydrate from localStorage if present. Done BEFORE _defaultPrompt seeding
    // would normally run, but since we made seeding idempotent it's fine here.
    // Strip retired seed intents and the default-named custom-intent so old
    // hydrated state doesn't resurrect intents we've removed from the source.
    const RETIRED_INTENT_NAMES = new Set(['Clinical trial inquiry', 'New custom intent', 'Medication']);
    // Capture the seed intent list BEFORE hydration so we can backfill any
    // seed-added-after-the-user-first-loaded intents (e.g. "Talk to human")
    // without forcing a Reset.
    const SEED_INTENTS = {};
    Object.keys(FLOWS).forEach(mode => {
      SEED_INTENTS[mode] = JSON.parse(JSON.stringify(FLOWS[mode].intents || []));
    });
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        if (saved?.flows) {
          Object.keys(saved.flows).forEach(mode => {
            if (FLOWS[mode]) {
              FLOWS[mode] = saved.flows[mode];
              FLOWS[mode].intents = (FLOWS[mode].intents || []).filter(i => !RETIRED_INTENT_NAMES.has(i.name));
            }
          });
        }
        if (saved?.welcome != null) welcomeState.text = saved.welcome;
      }
    } catch (e) { console.warn('Failed to hydrate from localStorage:', e); }

    // Backfill: append any seed intent (by id) that's missing from the
    // hydrated mode. Preserves user customizations on intents they already
    // had, and quietly adds new ones the prototype gained since they last loaded.
    Object.keys(SEED_INTENTS).forEach(mode => {
      if (!FLOWS[mode]) return;
      const have = new Set((FLOWS[mode].intents || []).map(i => i.id));
      SEED_INTENTS[mode].forEach(seedIntent => {
        if (!have.has(seedIntent.id)) {
          FLOWS[mode].intents.push(JSON.parse(JSON.stringify(seedIntent)));
        }
      });
    });

    // Re-seed _defaultPrompt for any message action missing it (e.g. new intents added after hydration)
    Object.values(FLOWS).forEach(flow => {
      flow.intents.forEach(intent => {
        if (intent.action.type === 'message' && intent.action._defaultPrompt === undefined) {
          intent.action._defaultPrompt = intent.action.prompt || '';
        }
      });
    });

    // Per-intent baseline snapshot — set to current action state on load and
    // refreshed on publish. Any drift from the baseline shows the green dot
    // on the node's icon.
    const _ACTION_INTERNAL_KEYS = new Set(['_defaultPrompt', '_baseline', '_activeTab']);
    function serializeAction(action) {
      if (!action) return '';
      const obj = {};
      Object.keys(action).sort().forEach(k => {
        if (_ACTION_INTERNAL_KEYS.has(k)) return;
        obj[k] = action[k];
      });
      return JSON.stringify(obj);
    }
    function captureIntentBaselines() {
      Object.values(FLOWS).forEach(flow => {
        flow.intents.forEach(intent => {
          intent._baseline = serializeAction(intent.action);
        });
      });
    }
    captureIntentBaselines();

    function persistFlows() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          flows: FLOWS,
          welcome: welcomeState.text,
          savedAt: Date.now(),
        }));
      } catch (e) { /* storage quota, private mode, etc. — swallow */ }
    }

    function resetToDefaults() {
      if (!confirm('Reset all edits and reload the seed data? This clears any customizations you made.')) return;
      try { localStorage.removeItem(STORAGE_KEY); } catch {}
      location.reload();
    }
    window.resetToDefaults = resetToDefaults;

    // ============================================================
    // SVG icons — Phosphor Regular (downloaded from phosphor-icons/core)
    // ============================================================
    const ICON_SVG = {

      lightning: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><polygon points="160 16 144 96 208 120 96 240 112 160 48 136 160 16" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg>',
      envelopeOpen: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><path d="M32,96V200a8,8,0,0,0,8,8H216a8,8,0,0,0,8-8V96L128,32Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="110.55" y1="152" x2="34.47" y2="205.74" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="221.53" y1="205.74" x2="145.45" y2="152" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><polyline points="224 96 145.46 152 110.55 152 32 96" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg>',
      phone: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><path d="M164.39,145.34a8,8,0,0,1,7.59-.69l47.16,21.13a8,8,0,0,1,4.8,8.3A48.33,48.33,0,0,1,176,216,136,136,0,0,1,40,80,48.33,48.33,0,0,1,81.92,32.06a8,8,0,0,1,8.3,4.8l21.13,47.2a8,8,0,0,1-.66,7.53L89.32,117a7.93,7.93,0,0,0-.54,7.81c8.27,16.93,25.77,34.22,42.75,42.41a7.92,7.92,0,0,0,7.83-.59Z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg>',
      plus: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><line x1="40" y1="128" x2="216" y2="128" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="128" y1="40" x2="128" y2="216" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg>',

      chatsCircle: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18 18" fill="none"><path d="M2.28523 9.70306C1.71223 8.63257 1.54305 7.39179 1.80856 6.20697C2.07407 5.02215 2.75657 3.97222 3.73161 3.24863C4.70665 2.52504 5.90929 2.17599 7.12022 2.26513C8.33114 2.35428 9.4697 2.87567 10.3283 3.73424C11.1868 4.59282 11.7082 5.73137 11.7974 6.9423C11.8865 8.15323 11.5375 9.35586 10.8139 10.3309C10.0903 11.3059 9.04037 11.9884 7.85555 12.254C6.67073 12.5195 5.42995 12.3503 4.35945 11.7773L2.40758 12.351C2.31066 12.3795 2.20786 12.3813 2.10998 12.3564C2.01211 12.3314 1.92276 12.2805 1.85133 12.2091C1.77991 12.1376 1.72903 12.0483 1.70405 11.9504C1.67907 11.8525 1.68091 11.7498 1.70937 11.6528L2.28523 9.70306Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M11.5272 5.63281C12.3777 5.67905 13.2027 5.9391 13.9259 6.38889C14.6492 6.83868 15.2473 7.46367 15.6648 8.206C16.0823 8.94833 16.3058 9.78401 16.3146 10.6357C16.3234 11.4873 16.1172 12.3274 15.715 13.0782L16.2888 15.0301C16.3172 15.127 16.3191 15.2298 16.2941 15.3277C16.2691 15.4255 16.2182 15.5149 16.1468 15.5863C16.0754 15.6577 15.986 15.7086 15.8882 15.7336C15.7903 15.7586 15.6875 15.7567 15.5906 15.7283L13.6408 15.1524C12.9967 15.4969 12.2858 15.698 11.5567 15.7419C10.8277 15.7859 10.0977 15.6717 9.41689 15.4072C8.73608 15.1427 8.12053 14.734 7.61242 14.2093C7.10432 13.6847 6.71568 13.0563 6.47314 12.3673" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    };

    // ============================================================
    // Action style — Figma 6483:2677–2702 (icon tint + color tokens)
    // ============================================================
    const ACTION_STYLE = {
      schedule: { bg: 'rgba(39,111,158,0.06)', border: 'rgba(39,111,158,0.20)', color: '#276f9e', icon: 'lightning', accentClass: 'title-accent-schedule' },
      message:  { bg: 'rgba(106,60,223,0.06)', border: 'rgba(106,60,223,0.20)', color: '#6a3cdf', icon: 'envelopeOpen', accentClass: 'title-accent-message' },
      transfer: { bg: 'rgba(36,168,164,0.06)', border: 'rgba(36,168,164,0.20)', color: '#24a8a4', icon: 'phone', accentClass: 'title-accent-transfer' },
    };
    const WELCOME_STYLE = { bg: 'rgba(103,68,191,0.06)', border: 'rgba(103,68,191,0.20)', color: '#6744bf' };

    // ============================================================
    // Card subtitle helpers
    // ============================================================
    function inboxDisplay(key) {
      const map = { billing: 'Billing inbox', clinical_team: 'Clinical inbox', front_desk: 'Front desk inbox', scheduling_athena: 'Scheduling in Athena' };
      return map[key] || (key ? `${key} inbox` : 'General inbox');
    }
    function scheduleSubtitle(a) {
      const caps = (a.capabilities || []).map(c => ({ book:'Booking', reschedule:'Rescheduling', cancel:'Cancellation' })[c]).filter(Boolean);
      const ehr = a.ehr || 'Athena';
      return caps.length ? `${ehr} • ${caps.join(' • ')}` : ehr;
    }
    function transferSubtitle(a) {
      const targets = a.targets || [];
      return targets.length === 0 ? 'No number set' : targets.length === 1 ? targets[0] : `${targets[0]} +${targets.length - 1} more`;
    }
    function cardSubtitle(a) {
      // Message-type intents route to an inbox via the AI agent. Show both halves
      // so the canvas card explains the full path: "AI call → Front desk inbox".
      if (a.type === 'message')  return `AI call → ${inboxDisplay(a.inbox)}`;
      if (a.type === 'schedule') return scheduleSubtitle(a);
      if (a.type === 'transfer') return transferSubtitle(a);
      return '';
    }
    function isIntentCustomized(intent) {
      // Compare the intent's current action against its captured baseline.
      // ANY change to a saved field flips this true → green dot shows on the
      // node icon. Baseline is reset on publish.
      if (intent._baseline === undefined) return false;
      return serializeAction(intent.action) !== intent._baseline;
    }

    let activeMode = 'business';
    let selectedNodeId = null;

    const $nodes = document.getElementById('canvas-nodes');
    const $svg = document.getElementById('canvas-svg');
    const $modeTriggerLabel = document.getElementById('mode-trigger-label');
    const $modeTriggerDot = document.getElementById('mode-trigger-dot');

    function modeDotClass(modeKey) {
      if (modeKey === 'business') return 'bg-emerald-500';
      if (modeKey === 'lunch') return 'bg-amber-500';
      if (modeKey === 'afterhours') return 'bg-stone-500';
      return 'bg-sky-500';
    }

    function shortModeLabel(label) {
      // "24/7 · Always on" → "24/7"; "Lunch · Mon–Fri 12pm–1pm" → "Lunch"
      return (label || '').split('·')[0].trim() || label;
    }

    function render() {
      const flow = FLOWS[activeMode];
      if ($modeTriggerLabel) $modeTriggerLabel.textContent = shortModeLabel(flow.label);
      if ($modeTriggerDot) $modeTriggerDot.className = `w-1.5 h-1.5 rounded-full ${modeDotClass(activeMode)}`;

      $nodes.innerHTML = '';
      $svg.innerHTML = '';

      // Layout (matches Figma 6483-2594)
      // Welcome card (left=300, width=240) ends at x=540. INTENT_LEFT must sit comfortably to
      // the right of that so (a) the cards don't overlap and (b) the connector arrow draws
      // forwards (left→right) — when INTENT_LEFT < welcomeRight the arrow head pointed backwards.
      const INTENT_LEFT = 740;
      const INTENT_TOP_START = 80;
      const INTENT_GAP_Y = 57;
      const INTENT_CARD_BASE_HEIGHT = 56;  // unselected: padding 10+icon 36+10
      const INTENT_CARD_WIDTH = 216;

      // Calc total height + center welcome vertically against the stack
      const stackHeight = flow.intents.length * INTENT_CARD_BASE_HEIGHT + (flow.intents.length - 1) * INTENT_GAP_Y;
      const stackCenterY = INTENT_TOP_START + stackHeight / 2;
      const welcomeTop = stackCenterY - 28;  // 28 = half of welcome card height

      // Start (Incoming call) — kept as a labelled chip on the far left
      const $startNode = makeStartNode(80, welcomeTop);
      $nodes.appendChild($startNode);

      // Welcome message
      const welcomeLeft = 300;
      $nodes.appendChild(makeWelcomeNode(welcomeLeft, welcomeTop));

      // Intent cards (combined intent + action)
      flow.intents.forEach((intent, i) => {
        const top = INTENT_TOP_START + i * (INTENT_CARD_BASE_HEIGHT + INTENT_GAP_Y);
        $nodes.appendChild(makeIntentCard(intent, INTENT_LEFT, top));
      });

      // Add intent button below the stack
      const addTop = INTENT_TOP_START + flow.intents.length * (INTENT_CARD_BASE_HEIGHT + INTENT_GAP_Y);
      $nodes.appendChild(makeAddIntentButton(INTENT_LEFT, addTop));

      // Connections
      // Start (right edge measured from rendered node) → Welcome
      const startRight = 80 + ($startNode.firstElementChild?.offsetWidth || 176);
      drawConnection(startRight, welcomeTop + 28, welcomeLeft, welcomeTop + 28, 'c-start-welcome');
      // Welcome → each intent (fan-out)
      const welcomeRight = welcomeLeft + INTENT_CARD_WIDTH;  // 300+216=516
      const welcomeCenterY = welcomeTop + 28;
      flow.intents.forEach((intent, i) => {
        const top = INTENT_TOP_START + i * (INTENT_CARD_BASE_HEIGHT + INTENT_GAP_Y);
        const cardCenterY = top + INTENT_CARD_BASE_HEIGHT / 2;
        drawConnection(welcomeRight, welcomeCenterY, INTENT_LEFT, cardCenterY, `c-welcome-${intent.id}`);
      });
    }

    function makeStartNode(left, topCenter) {
      // Vertically center against the welcome row.
      const top = topCenter;  // pass through the same vertical center as welcome
      const el = document.createElement('div');
      el.className = 'start-node absolute';
      el.style.left = `${left}px`;
      el.style.top = `${top}px`;
      el.dataset.nodeId = 'start';
      el.innerHTML = `
        <div class="card-shell no-bg" style="width:auto">
          <div class="card-icon" style="background:rgba(102,101,97,0.06);border-color:rgba(102,101,97,0.20);color:#666561">${ICON_SVG.flagPennant}</div>
          <div class="card-text">
            <div class="card-title">Incoming call</div>
            <div class="card-subtitle">${shortModeLabel(FLOWS[activeMode].label)}</div>
          </div>
        </div>`;
      return el;
    }

    function makeWelcomeNode(left, top) {
      const el = document.createElement('div');
      el.className = 'flow-node absolute';
      el.style.left = `${left}px`;
      el.style.top = `${top}px`;
      el.dataset.nodeId = 'welcome';
      const isSelected = selectedNodeId === 'welcome';
      const shellClass = `card-shell no-bg${isSelected ? ' is-selected' : ''}`;
      // Welcome's customization dot: shown when the text has been edited from default.
      const isCustomized = welcomeState.text !== welcomeState._defaultText;
      const dot = isCustomized ? '<div class="card-dot"></div>' : '';
      const iconStyle = isSelected
        ? `background:${WELCOME_STYLE.bg};color:${WELCOME_STYLE.color}`
        : `background:${WELCOME_STYLE.bg};border-color:${WELCOME_STYLE.border};color:${WELCOME_STYLE.color}`;
      el.innerHTML = `
        <div class="${shellClass}">
          <div class="card-icon" style="${iconStyle}">${ICON_SVG.smiley}</div>
          <div class="card-text"><div class="card-title">Greeting</div></div>
          ${dot}
        </div>`;
      el.addEventListener('click', openWelcomePanel);
      return el;
    }

    function makeIntentCard(intent, left, top) {
      const el = document.createElement('div');
      el.className = 'flow-node absolute';
      el.style.left = `${left}px`;
      el.style.top = `${top}px`;
      el.dataset.nodeId = `intent-${intent.id}`;
      const a = intent.action;
      let style = ACTION_STYLE[a.type] || ACTION_STYLE.message;
      if (a.type === 'message' && a.inbox === 'scheduling_athena') {
        style = { bg: 'rgba(41,114,195,0.06)', border: 'rgba(41,114,195,0.20)', color: '#2972C3', icon: 'lightning', accentClass: 'title-accent-schedule' };
      }
      const isSelected = selectedNodeId === `intent-${intent.id}`;
      const isCustomized = isIntentCustomized(intent);
      const dot = isCustomized ? '<div class="card-dot"></div>' : '';
      const titleClass = 'card-title';
      const subtitle = cardSubtitle(a);
      const iconStyle = isSelected
        ? `background:${style.bg};color:${style.color}`
        : `background:${style.bg};border-color:${style.border};color:${style.color}`;
      el.innerHTML = `
        <div class="card-shell${isSelected ? ' is-selected' : ''}">
          <div class="card-icon" style="${iconStyle}">${ICON_SVG[style.icon]}</div>
          <div class="card-text">
            <div class="${titleClass}">${intent.name}</div>
            ${subtitle ? `<div class="card-subtitle">${subtitle}</div>` : ''}
          </div>
          ${dot}
        </div>`;
      el.addEventListener('click', () => {
        selectedNodeId = `intent-${intent.id}`;
        render();
        openIntentPanel(intent.id);
      });
      return el;
    }

    function drawConnection(x1, y1, x2, y2, id, opts) {
      opts = opts || {};
      const xc = x1 + (x2 - x1) * 0.5;
      const d = `M ${x1} ${y1} C ${xc} ${y1}, ${xc} ${y2}, ${x2} ${y2}`;
      // Visible curve
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      path.setAttribute('stroke', '#d6d3d1'); path.setAttribute('stroke-width', '1');
      path.setAttribute('fill', 'none'); path.setAttribute('id', id);
      $svg.appendChild(path);

      // Wider invisible hit-area + DOM disconnect button at midpoint (only when disconnect callback is supplied)
      if (typeof opts.disconnect === 'function') {
        const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        hit.setAttribute('d', d);
        hit.setAttribute('stroke', 'transparent');
        hit.setAttribute('stroke-width', '18');
        hit.setAttribute('fill', 'none');
        hit.style.cursor = 'pointer';
        hit.style.pointerEvents = 'stroke';
        $svg.appendChild(hit);

        const mx = (x1 + x2) / 2;
        const my = (y1 + y2) / 2;
        const btn = document.createElement('button');
        btn.className = 'disconnect-btn';
        btn.style.left = `${mx - 11}px`;
        btn.style.top = `${my - 11}px`;
        btn.title = opts.label || 'Disconnect';
        btn.innerHTML = '<svg viewBox="0 0 256 256" width="11" height="11" fill="none" stroke="currentColor" stroke-width="24" stroke-linecap="round"><line x1="56" y1="56" x2="200" y2="200"/><line x1="200" y1="56" x2="56" y2="200"/></svg>';
        btn.addEventListener('click', (e) => { e.stopPropagation(); opts.disconnect(); });
        $nodes.appendChild(btn);

        // Show button when hovering either the hit-area or the button itself
        const show = () => btn.classList.add('show');
        const hide = () => btn.classList.remove('show');
        hit.addEventListener('mouseenter', show);
        hit.addEventListener('mouseleave', hide);
        path.addEventListener('mouseenter', show);
        path.addEventListener('mouseleave', hide);
        btn.addEventListener('mouseenter', show);
        btn.addEventListener('mouseleave', hide);
      }
    }

                <div class="flex-1 min-w-0"><div class="text-sm text-stone-900">Referral request</div><div class="text-xs text-stone-500 truncate">"My doctor sent a referral"</div></div>
              </button>

                <span class="w-5 h-5 rounded border border-dashed border-stone-400 flex items-center justify-center text-xs leading-none">+</span>
                <div><div class="text-sm font-medium">Define your own…</div><div class="text-xs text-stone-500">Start from a blank intent</div></div>

        </div>`;
      setTimeout(() => wireAddIntentDropdown(), 0);
