    // Attach the document-level outside-click handler once — render() re-creates the trigger
    // and dropdown nodes each time, but this listener only ever needs to exist once.
    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('add-intent-dropdown');
      const trigger = document.getElementById('add-intent-trigger');
      if (dropdown && !dropdown.classList.contains('hidden')) {
        if (!dropdown.contains(e.target) && !(trigger && trigger.contains(e.target))) {
          dropdown.classList.add('hidden');
        }
      }
      const inboxMenu = document.getElementById('inbox-menu');
      const inboxTrigger = document.getElementById('inbox-trigger');
      if (inboxMenu && !inboxMenu.classList.contains('hidden')) {
        if (!inboxMenu.contains(e.target) && !(inboxTrigger && inboxTrigger.contains(e.target))) {
          inboxMenu.classList.add('hidden');
        }
      }
      const intakeMenu = document.getElementById('add-intake-menu');
      const intakeTrigger = document.getElementById('add-intake-trigger');
      if (intakeMenu && !intakeMenu.classList.contains('hidden')) {
        if (!intakeMenu.contains(e.target) && !(intakeTrigger && intakeTrigger.contains(e.target))) {
          intakeMenu.classList.add('hidden');
        }
      }
      const callbackMenu = document.getElementById('callback-menu');
      const callbackTrigger = document.getElementById('callback-trigger');
      if (callbackMenu && !callbackMenu.classList.contains('hidden')) {
        if (!callbackMenu.contains(e.target) && !(callbackTrigger && callbackTrigger.contains(e.target))) {
          callbackMenu.classList.add('hidden');
        }
      }
    });

    function wireAddIntentDropdown() {
      const trigger = document.getElementById('add-intent-trigger');
      const dropdown = document.getElementById('add-intent-dropdown');
      if (!trigger || !dropdown) return;
      trigger.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('hidden'); });
      document.querySelectorAll('.suggested-intent').forEach(btn => btn.addEventListener('click', () => { addNewIntent({ name: btn.dataset.name, example: btn.dataset.example }); dropdown.classList.add('hidden'); }));
      document.getElementById('add-custom-intent').addEventListener('click', () => { addNewIntent({ name: 'New custom intent', example: 'When the caller says…' }); dropdown.classList.add('hidden'); });
    }

    function addNewIntent({ name, example }) {
      const id = `custom_${Date.now()}`;
      const action = { type: 'message', prompt: 'Take down their name, callback number, and the reason for their call.', inbox: 'front_desk' };
      action._defaultPrompt = action.prompt;
      FLOWS[activeMode].intents.push({ id, name, custom: true, examples: [example], action });
      markDirty();
      render();
      setTimeout(() => openIntentPanel(id), 50);
    }

    const $sidePanel = document.getElementById('side-panel');
    const $panelTitle = document.getElementById('panel-title');
    const $panelBody = document.getElementById('panel-body');
    const $panelIntentName = document.getElementById('panel-intent-name');
    const $panelActionSep = document.getElementById('panel-action-sep');
    const $panelActionTrigger = document.getElementById('panel-action-trigger');
    const $panelActionLabel = document.getElementById('panel-action-label');
    const $panelActionMenu = document.getElementById('panel-action-menu');
    const $panelCaret = document.getElementById('panel-caret');
    const $panelPreviewBtn = document.getElementById('panel-preview-btn');
    const $panelFooter = document.getElementById('panel-footer');

    // Helper: set the header breadcrumb. actionLabel optional.
    function setPanelHeader(name, actionLabel) {
      $panelIntentName.textContent = name || '';
      if (actionLabel) {
        $panelActionSep.classList.remove('hidden');
        $panelActionTrigger.classList.remove('hidden');
        $panelActionTrigger.classList.add('flex');
        $panelPreviewBtn.classList.remove('hidden');
        $panelActionLabel.textContent = actionLabel;
      } else {
        $panelActionSep.classList.add('hidden');
        $panelActionTrigger.classList.add('hidden');
        $panelActionTrigger.classList.remove('flex');
        $panelPreviewBtn.classList.add('hidden');
        $panelActionMenu.classList.add('hidden');
      }
    }

    // Action-type menu (AI call / Human transfer) — wired once on load.
    // Tracks which intent the open editor is for, so options apply to the right one.
    let _activeIntentForActionMenu = null;
    if ($panelActionTrigger) {
      $panelActionTrigger.addEventListener('click', (e) => {
        e.stopPropagation();
        $panelActionMenu.classList.toggle('hidden');
      });
    }
    // Event delegation on the static menu container — survives panel re-renders.
    if ($panelActionMenu) {
      $panelActionMenu.addEventListener('click', (e) => {
        const opt = e.target.closest('.action-menu-option');
        if (!opt || !_activeIntentForActionMenu) return;
        e.stopPropagation();
        const newType = opt.dataset.actionType;
        const intent = _activeIntentForActionMenu;
        $panelActionMenu.classList.add('hidden');
        if (!newType || newType === intent.action.type) return;
        intent.action = freshActionDefaults(newType, intent.action);
        setPanelHeader(intent.name, ACTION_KINDS[newType]?.headerLabel || null);
        $panelBody.innerHTML = renderIntentBody(intent);
        wirePanelInteractions(intent);
        render();
        document.querySelector(`[data-node-id="intent-${intent.id}"]`)?.classList.add('selected');
        markDirty();
      });
    }
    document.addEventListener('click', (e) => {
      if (!$panelActionMenu.classList.contains('hidden') && !$panelActionMenu.contains(e.target) && !$panelActionTrigger.contains(e.target)) {
        $panelActionMenu.classList.add('hidden');
      }
    });

    function openWelcomePanel() {
      selectedNodeId = 'welcome';
      render();
      setPanelHeader('Greeting');
      $panelBody.innerHTML = renderWelcomeBody();
      wireWelcomePanel();
      $sidePanel.classList.remove('hidden');
    }

    function renderWelcomeBody() {
      return `
        <div class="p-5 space-y-4">
          <p class="text-xs text-stone-500">The opening line on every call, before classifying the caller's intent.</p>

          <div>
            <label class="text-xs font-medium text-stone-700">Greeting</label>
            <textarea id="welcome-text" rows="4" placeholder="e.g., Thanks for calling Sterling Family Care. How may I help you today?" class="mt-1.5 w-full px-3 py-2.5 text-sm bg-white border border-stone-200 rounded-md resize-none focus:outline-none focus:border-stone-400">${welcomeState.text}</textarea>
            <p class="text-[11px] text-stone-500 mt-1.5 leading-snug">
              Played verbatim at the start of every call. Keep it short — one sentence — so callers can interrupt with their request.
            </p>
          </div>
        </div>
      `;
    }

    function wireWelcomePanel() {
      const textarea = document.getElementById('welcome-text');
      if (textarea) {
        textarea.addEventListener('input', () => {
          welcomeState.text = textarea.value;
          render();
          markDirty();
        });
      }
    }

    // ============================================================
    // Preview side panel — voice agent preview with the actual comms AudioOrb
    // ported to vanilla JS. Canvas draw function lifted from
    // comms/web/src/components/openai-realtime/AudioOrb.tsx (lines 31–223);
    // audio analyser pattern mirrors useAudioAnalyser.ts.
    //
    // Idle: gentle breathing + idle wobble (no audio source needed).
    // Recording: requests mic permission, pipes the mic stream through a
    // Web Audio AnalyserNode, and feeds frequency data into the same draw
    // loop the real product uses. If mic access is denied, we fall back to
    // synthesized frequency data so the visual still demos.
    // ============================================================
    const $previewPanel = document.getElementById('preview-panel');
    const $previewBtn   = document.getElementById('preview-btn');
    const $previewClose = document.getElementById('preview-close');
    const $previewMic   = document.getElementById('preview-mic');
    const $previewLabel = document.getElementById('preview-label');
    const $blobCanvas   = document.getElementById('preview-blob-canvas');
    const IDLE_LABEL = 'Click to start talking';

    // --- AudioOrb state (mirrors the refs in AudioOrb.tsx) ---
    const orb = {
      time: 0,
      smoothVolume: 0,
      smoothBass: 0,
      smoothMid: 0,
      smoothHigh: 0,
      freqData: new Uint8Array(128),
      volume: 0,
      isActive: false,
      fakeData: false,         // true when we couldn't get a real mic stream
      rafId: 0,
    };

    // --- Audio plumbing (mirrors useAudioAnalyser.ts) ---
    let audioCtx = null;
    let analyserNode = null;
    let micStream = null;
    let micSourceNode = null;

    async function startMicAnalyser() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        micStream = stream;
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        analyserNode = audioCtx.createAnalyser();
        analyserNode.fftSize = 256;
        analyserNode.smoothingTimeConstant = 0.75;
        orb.freqData = new Uint8Array(analyserNode.frequencyBinCount);
        micSourceNode = audioCtx.createMediaStreamSource(stream);
        micSourceNode.connect(analyserNode);
        // Note: deliberately NOT connecting analyser → destination; we don't want feedback.
        orb.fakeData = false;
        return true;
      } catch (err) {
        console.warn('[preview] mic access denied — falling back to synthesized audio for the visual:', err.message);
        orb.fakeData = true;
        return false;
      }
    }
    function stopMicAnalyser() {
      try {
        if (micSourceNode) micSourceNode.disconnect();
        if (analyserNode)  analyserNode.disconnect();
      } catch {}
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
      micSourceNode = null;
      analyserNode = null;
    }

    // --- Pull real frequency data each frame, or synthesize if no analyser ---
    function pullAudio() {
      if (analyserNode) {
        analyserNode.getByteFrequencyData(orb.freqData);
        let sum = 0;
        for (let i = 0; i < orb.freqData.length; i++) sum += orb.freqData[i];
        orb.volume = sum / orb.freqData.length / 255;
      } else if (orb.fakeData) {
        // Synthesized spectrum — sinusoidal energy across bands so the morph still demos
        const t = orb.time;
        for (let i = 0; i < orb.freqData.length; i++) {
          const a = Math.sin(t * 1.3 + i * 0.04) * 60;
          const b = Math.sin(t * 2.1 + i * 0.08) * 40;
          const c = Math.cos(t * 0.7 + i * 0.02) * 30;
          orb.freqData[i] = Math.max(0, Math.min(255, 100 + a + b + c));
        }
        orb.volume = 0.55 + Math.sin(t * 1.7) * 0.25;
      }
    }

    // --- Canvas draw — ported almost verbatim from AudioOrb.tsx ---
    const POINTS = 128;
    const TWO_PI = Math.PI * 2;

    function drawBlob() {
      const canvas = $blobCanvas;
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      if (!ctx) return;

      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      if (canvas.width !== w * dpr || canvas.height !== h * dpr) {
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      ctx.clearRect(0, 0, w, h);

      const cx = w / 2;
      const cy = h / 2;
      const maxRadius = Math.min(w, h) * 0.37;

      orb.time += 0.008;
      const t = orb.time;

      const targetVolume = orb.isActive ? orb.volume : 0;
      orb.smoothVolume += (targetVolume - orb.smoothVolume) * 0.14;
      const sv = orb.smoothVolume;

      const data = orb.freqData;
      const binCount = data.length;

      const getBand = (center) => {
        if (binCount === 0) return 0;
        const lo = Math.max(0, center - 3);
        const hi = Math.min(binCount - 1, center + 3);
        let s = 0;
        for (let b = lo; b <= hi; b++) s += data[b];
        return s / (hi - lo + 1) / 255;
      };

      const rawBass = orb.isActive ? getBand(Math.floor(binCount * 0.08)) : 0;
      const rawMid  = orb.isActive ? getBand(Math.floor(binCount * 0.3))  : 0;
      const rawHigh = orb.isActive ? getBand(Math.floor(binCount * 0.6))  : 0;

      orb.smoothBass += (rawBass - orb.smoothBass) * 0.04;
      orb.smoothMid  += (rawMid  - orb.smoothMid)  * 0.035;
      orb.smoothHigh += (rawHigh - orb.smoothHigh) * 0.03;
      const bass = orb.smoothBass;
      const mid  = orb.smoothMid;
      const high = orb.smoothHigh;

      // Idle breathing
      const breathe = 1 + Math.sin(t * 1.2) * 0.02;
      const baseRadius = maxRadius * breathe;
      const volumeScale = 1 + sv * 0.5;

      // Hue shift: bass → blue, mid/high → purple
      const blueShift = Math.min(1, bass * 2);
      const purpleShift = Math.min(1, (mid + high) * 1.5);
      const colorMix = orb.isActive
        ? Math.max(0.25, Math.min(0.75, 0.5 + purpleShift * 0.2 - blueShift * 0.15))
        : 0.5;

      const lerp = (r1,g1,b1,r2,g2,b2,t) => [
        Math.round(r1 + (r2 - r1) * t),
        Math.round(g1 + (g2 - g1) * t),
        Math.round(b1 + (b2 - b1) * t),
      ];
      const [cr, cg, cb] = lerp(80,160,255, 170,70,255, colorMix);
      const [mr, mg, mb] = lerp(90,140,255, 185,80,255, colorMix);

      // Outer glow — 3 layered radial gradients
      for (let layer = 3; layer >= 1; layer--) {
        const glowRadius = baseRadius * volumeScale + layer * 16 + sv * layer * 18;
        const glowAlpha  = orb.isActive ? 0.04 + sv * 0.08 * (1 / layer) : 0.02 * (1 / layer);
        const grad = ctx.createRadialGradient(cx, cy, baseRadius * 0.5, cx, cy, glowRadius);
        grad.addColorStop(0,   `rgba(${cr},${cg},${cb},${glowAlpha})`);
        grad.addColorStop(0.5, `rgba(${mr},${mg},${mb},${glowAlpha * 0.5})`);
        grad.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`);
        ctx.beginPath();
        ctx.arc(cx, cy, glowRadius, 0, TWO_PI);
        ctx.fillStyle = grad;
        ctx.fill();
      }

      // Build morphing perimeter with audio-driven displacement
      const points = [];
      for (let i = 0; i < POINTS; i++) {
        const angle = (i / POINTS) * TWO_PI;
        let displacement = 0;
        if (orb.isActive && binCount > 0) {
          displacement =
            bass * Math.sin(angle * 2 + t * 0.6) * maxRadius * 0.07 +
            mid  * Math.sin(angle * 3 + t * 0.9) * maxRadius * 0.045 +
            high * Math.sin(angle * 5 + t * 1.4) * maxRadius * 0.025;
          displacement *= sv * 4;
        }
        const idleWobble =
          Math.sin(angle * 2 + t * 0.5) * 3.5 +
          Math.sin(angle * 3 + t * 0.7) * 2.0 +
          Math.sin(angle * 5 + t * 0.3) * 1.0;
        const r = baseRadius * volumeScale + displacement + idleWobble;
        points.push([cx + Math.cos(angle) * r, cy + Math.sin(angle) * r]);
      }

      // Cardinal spline interpolation through the points
      ctx.beginPath();
      ctx.moveTo(points[0][0], points[0][1]);
      for (let i = 0; i < points.length; i++) {
        const p0 = points[(i - 1 + points.length) % points.length];
        const p1 = points[i];
        const p2 = points[(i + 1) % points.length];
        const p3 = points[(i + 2) % points.length];
        const tension = 0.35;
        const cp1x = p1[0] + (p2[0] - p0[0]) * tension;
        const cp1y = p1[1] + (p2[1] - p0[1]) * tension;
        const cp2x = p2[0] - (p3[0] - p1[0]) * tension;
        const cp2y = p2[1] - (p3[1] - p1[1]) * tension;
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2[0], p2[1]);
      }
      ctx.closePath();

      // Body fill
      const fillGrad = ctx.createRadialGradient(
        cx - baseRadius * 0.2, cy - baseRadius * 0.2, baseRadius * 0.1,
        cx, cy, baseRadius * volumeScale * 1.2,
      );
      fillGrad.addColorStop(0,   'rgba(190,215,255,0.95)');
      fillGrad.addColorStop(0.3, `rgba(${cr},${cg},${cb},0.9)`);
      fillGrad.addColorStop(0.7, `rgba(${mr},${mg},${mb},0.6)`);
      fillGrad.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = fillGrad;
      ctx.fill();

      // Inner specular highlight
      const hi = ctx.createRadialGradient(
        cx - baseRadius * 0.25, cy - baseRadius * 0.3, 0,
        cx - baseRadius * 0.1,  cy - baseRadius * 0.1, baseRadius * 0.6,
      );
      hi.addColorStop(0,   'rgba(255,255,255,0.35)');
      hi.addColorStop(0.5, 'rgba(255,255,255,0.08)');
      hi.addColorStop(1,   'rgba(255,255,255,0)');
      ctx.fillStyle = hi;
      ctx.fill();

      // Edge stroke — alpha scales with volume when active
      const edgeAlpha = orb.isActive ? 0.12 + sv * 0.2 : 0.08;
      ctx.strokeStyle = `rgba(${mr},${mg},${mb},${edgeAlpha})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Center glow
      const centerSize = baseRadius * 0.4 * (1 + sv * 0.5);
      const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, centerSize);
      const centerAlpha = orb.isActive ? 0.12 + sv * 0.25 : 0.06 + Math.sin(t * 1.5) * 0.03;
      centerGrad.addColorStop(0, `rgba(255,255,255,${centerAlpha})`);
      centerGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, centerSize, 0, TWO_PI);
      ctx.fillStyle = centerGrad;
      ctx.fill();
    }

    function tickOrb() {
      pullAudio();
      drawBlob();
      orb.rafId = requestAnimationFrame(tickOrb);
    }
    function startOrb() { if (!orb.rafId) orb.rafId = requestAnimationFrame(tickOrb); }
    function stopOrb()  { if (orb.rafId) { cancelAnimationFrame(orb.rafId); orb.rafId = 0; } }

    // --- Recording state ---
    let recordingStart = 0;
    let recordingTimer = null;

    // Open the preview panel. Pass alongside=true to keep the editor visible
    // (panel sits to the LEFT of editor). Default false → preview replaces editor.
    function openPreviewPanel(opts) {
      const alongside = opts && opts.alongside === true;
      if (alongside && !$sidePanel.classList.contains('hidden')) {
        // Slide preview to the left of the 400px editor
        $previewPanel.style.right = '400px';
        // Activate the editor's Preview button — matches Figma 4:8012 active state:
        // light blue tint background, primary blue text/icon, borderless.
        $panelPreviewBtn.style.background = 'rgba(50,107,232,0.08)';
        $panelPreviewBtn.style.color = '#326BE8';
        $panelPreviewBtn.style.borderColor = 'transparent';
        // Drop the editor's left-cast shadow when both panels are open — the preview
        // sits flush against it, and the stacked shadows otherwise darken the seam.
        $sidePanel.style.boxShadow = 'none';
        // Swap the preview's box-shadow (which would bleed onto the editor) for a
        // pseudo-element gradient strip that only exists to the LEFT of the panel.
        $previewPanel.classList.add('left-shadow-only');
      } else {
        // Global preview — close editor, take the right edge
        $sidePanel.classList.add('hidden');
        $previewPanel.style.right = '0';
      }
      $previewPanel.classList.remove('hidden');
      startOrb();
    }
    function closePreviewPanel() {
      stopRecording();
      $previewPanel.classList.add('hidden');
      $previewPanel.style.right = '0';
      // Reset the editor Preview button active styling
      $panelPreviewBtn.style.background = '';
      $panelPreviewBtn.style.color = '';
      $panelPreviewBtn.style.borderColor = '';
      // Restore the editor's left-cast shadow now that it stands alone again.
      // (Clearing to '' would NOT fall back to the inline-style attribute — once we
      // set it via JS, that's the only source of truth.)
      $sidePanel.style.boxShadow = '-4px 0 28px rgba(0,0,0,0.06)';
      // Restore the preview's normal box-shadow (only matters if it gets reopened in
      // global mode — when alongside the editor it'll get re-added next time).
      $previewPanel.classList.remove('left-shadow-only');
      stopOrb();
    }
    async function startRecording() {
      $previewPanel.classList.add('recording');
      recordingStart = Date.now();
      $previewLabel.textContent = '00:00';
      recordingTimer = setInterval(() => {
        const sec = Math.floor((Date.now() - recordingStart) / 1000);
        const mm = String(Math.floor(sec / 60)).padStart(2, '0');
        const ss = String(sec % 60).padStart(2, '0');
        $previewLabel.textContent = `${mm}:${ss}`;
      }, 250);

      const got = await startMicAnalyser();
      orb.isActive = true;
      if (!got) console.warn('[preview] mic blocked — using synthesized audio for the blob');
    }
    function stopRecording() {
      $previewPanel.classList.remove('recording');
      $previewLabel.textContent = IDLE_LABEL;
      if (recordingTimer) clearInterval(recordingTimer);
      recordingTimer = null;
      stopMicAnalyser();
      orb.isActive = false;
      orb.fakeData = false;
    }

    // Global Preview button (top bar) — opens preview WITHOUT editor context
    if ($previewBtn)      $previewBtn.addEventListener('click', () => openPreviewPanel({ alongside: false }));
    // Editor-panel Preview button — opens preview ALONGSIDE the editor
    if ($panelPreviewBtn) $panelPreviewBtn.addEventListener('click', () => openPreviewPanel({ alongside: true }));
    if ($previewClose) $previewClose.addEventListener('click', closePreviewPanel);
    if ($previewMic)   $previewMic.addEventListener('click', () => {
      if ($previewPanel.classList.contains('recording')) stopRecording();
      else startRecording();
    });

    function openIntentPanel(intentId) {
      const intent = FLOWS[activeMode].intents.find(i => i.id === intentId);
      if (!intent) return;
      selectedNodeId = `intent-${intent.id}`;
      render();
      setPanelHeader(intent.name, ACTION_KINDS[intent.action.type]?.headerLabel || null);
      $panelBody.innerHTML = renderIntentBody(intent);
      wirePanelInteractions(intent);
      $sidePanel.classList.remove('hidden');
      // Snapshot the intent's state as it was on open, so Discard can revert to it
      // and Save/Discard can switch between disabled/enabled based on diff.
      _editingIntent = intent;
      _editingSnapshot = intentSnapshot(intent);
      updateSaveDiscardState();
    }

    // ─── Save/Discard state tracking ────────────────────────────────────────
    // Snapshot of the intent at the moment the panel was opened (or last saved).
    // If the live intent differs from this, Save + Discard light up.
    let _editingIntent = null;
    let _editingSnapshot = null;

    function intentSnapshot(intent) {
      return JSON.stringify({
        name: intent.name,
        examples: intent.examples,
        smsTargets: intent.smsTargets,
        action: intent.action,
      });
    }

    function isPanelDirty() {
      if (!_editingIntent || _editingSnapshot == null) return false;
      return intentSnapshot(_editingIntent) !== _editingSnapshot;
    }

    function updateSaveDiscardState() {
      const dirty = isPanelDirty();
      const $save = document.getElementById('panel-save');
      const $discard = document.getElementById('panel-discard');
      if ($save) {
        if (dirty) {
          $save.disabled = false;
          $save.className = 'inline-flex items-center h-9 px-3 py-2 text-sm font-medium leading-[18px] bg-[var(--fg-primary)] text-[var(--fg-inverted)] rounded-md hover:opacity-90 transition cursor-pointer';
        } else {
          $save.disabled = true;
          $save.className = 'inline-flex items-center h-9 px-3 py-2 text-sm font-medium leading-[18px] bg-[var(--fg-disabled)] text-[var(--fg-inverted)] rounded-md cursor-not-allowed transition';
        }
      }
      if ($discard) {
        if (dirty) {
          $discard.disabled = false;
          $discard.className = 'inline-flex items-center h-9 px-3 py-2 text-sm font-medium leading-[18px] text-[var(--fg-primary)] hover:bg-stone-100 rounded-md transition cursor-pointer';
        } else {
          $discard.disabled = true;
          $discard.className = 'inline-flex items-center h-9 px-3 py-2 text-sm font-medium leading-[18px] text-[var(--fg-disabled)] rounded-md cursor-not-allowed transition';
        }
      }
    }

    function discardPanelChanges() {
      if (!_editingIntent || _editingSnapshot == null) return;
      const snap = JSON.parse(_editingSnapshot);
      // Restore every field that the editor can mutate
      _editingIntent.name        = snap.name;
      _editingIntent.examples    = snap.examples;
      _editingIntent.smsTargets  = snap.smsTargets;
      _editingIntent.action      = snap.action;
      // Re-render panel body so all inputs reflect the restored values
      setPanelHeader(_editingIntent.name, ACTION_KINDS[_editingIntent.action.type]?.headerLabel || null);
      $panelBody.innerHTML = renderIntentBody(_editingIntent);
      wirePanelInteractions(_editingIntent);
      // Repaint the canvas (card subtitle, connection lines, etc.)
      render();
      persistFlows();
      updateSaveDiscardState();
    }

    function renderIntentBody(intent) {
      if (intent.action.type === 'message') {
        return `
          <div id="action-config">
            ${renderMessageConfig(intent)}
          </div>
          ${intent.overridden ? `<div class="mx-5 mb-4 p-3 bg-amber-50/50 border border-amber-200 rounded-lg text-xs text-amber-800">Overridden in this mode.</div>` : ''}
        `;
      }
      // For non-message types (transfer, schedule) — header menu drives the
      // action type, so skip the in-body action dropdown.
      return `
        <div class="px-4 py-4 flex flex-col gap-8">
          ${intent.custom ? renderTriggerSignals(intent) : ''}

          <div id="action-config">
            ${renderActionConfig(intent.action, intent.id)}
          </div>

          ${intent.overridden ? `
          <div class="p-3 bg-amber-50/50 border border-amber-200 rounded-lg text-xs text-amber-800">Overridden in this mode.</div>` : ''}
        </div>
      `;
    }

    function renderMessageConfig(intent) {
      const action = intent.action;
      const prompt = action.prompt || '';
      const collect = action.collect || [];
      const activeTab = action._activeTab || 'during'; // 'during' | 'post'

      const inboxOptions = [
        { key: 'front_desk',        label: 'Front desk inbox' },
        { key: 'billing',           label: 'Billing inbox' },
        { key: 'clinical_team',     label: 'Clinic inbox' },
        { key: 'scheduling_athena', label: 'Scheduling in Athena' },
      ];
      const currentInbox = inboxOptions.find(o => o.key === action.inbox) || inboxOptions[0];

      const knowledgeText = action.knowledgeSource || DEFAULT_KNOWLEDGE[intent.id] || DEFAULT_KNOWLEDGE._default;
      const emailEnabled = action.emailEnabled !== false; // default ON
      const emailTo = action.emailTo || 'info@springclinic.com';

      // Caret-up-down SVG used by all selector fields (matches Figma CaretUpDown)
      const caretUpDownSvg = `
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" style="color: var(--fg-tertiary)">
          <polyline points="5 10 8 13 11 10"/>
          <polyline points="5 6 8 3 11 6"/>
        </svg>`;

      // ─── Tabs (Segmented Toggle) — matches Figma 4:6480 ────────────────────
      const tabs = `
        <div class="flex items-center justify-center p-[2px] rounded-lg w-full" style="background: var(--bg-surface-secondary)">
          <div class="flex flex-1 items-center gap-1 rounded-md overflow-hidden">
            <button type="button" data-tab="during" class="tab-btn flex-1 flex items-center justify-center px-3 py-1.5 rounded-md text-sm leading-[18px] font-medium transition ${activeTab === 'during' ? 'bg-[var(--bg-surface-primary)] border' : ''}" ${activeTab === 'during' ? 'style="border-width: 0.5px; border-color: var(--border-default); color: var(--fg-primary)"' : 'style="color: var(--neutral-10)"'}>

    function wirePanelInteractions(intent) {
      // Action-menu options are wired ONCE on load via delegation on the menu
      // container. Here we just refresh the active intent reference.
      _activeIntentForActionMenu = intent;

      // ── Tabs: During the call / Post call (Figma 4:6480) ─────────────────
      $panelBody.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const tab = btn.dataset.tab;
          intent.action._activeTab = tab;
          // Re-render to swap active tab styling + show/hide content
          $panelBody.innerHTML = renderIntentBody(intent);
          wirePanelInteractions(intent);
        });
      });

      // ── Email notification toggle (Post-call tab) ────────────────────────
      const emailToggle = document.getElementById('email-toggle');
      if (emailToggle) {
        emailToggle.addEventListener('click', (e) => {
          e.stopPropagation();
          intent.action.emailEnabled = !(intent.action.emailEnabled !== false);
          $panelBody.innerHTML = renderIntentBody(intent);
          wirePanelInteractions(intent);
          markDirty();
        });
      }
      const emailInput = document.getElementById('email-input');
      if (emailInput) {
        emailInput.addEventListener('input', () => {
          intent.action.emailTo = emailInput.value;
          markDirty();
        });
      }

      // Action dropdown trigger
      const trigger = document.getElementById('action-dropdown-trigger');
      const menu = document.getElementById('action-dropdown-menu');
      if (trigger && menu) {
        trigger.addEventListener('click', (e) => {
          e.stopPropagation();
          menu.classList.toggle('hidden');
        });
      }
      // Action option selection
      $panelBody.querySelectorAll('.action-dropdown-option').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!btn.dataset.actionType) return;
          intent.action = freshActionDefaults(btn.dataset.actionType, intent.action);
          // 1. Update the editor body
          $panelBody.innerHTML = renderIntentBody(intent);
          wirePanelInteractions(intent);
          // 2. Update the canvas card
          render();
          document.querySelector(`[data-node-id="intent-${intent.id}"]`)?.classList.add('selected');
          document.querySelector(`[data-node-id="action-${intent.id}"]`)?.classList.add('selected');
          // 3. Mark draft
          markDirty();
        });
      });

      // Add-field dropdown (only present on message-type actions)
      const fieldTrigger = document.getElementById('add-field-trigger');
      const fieldMenu    = document.getElementById('add-field-menu');
      if (fieldTrigger && fieldMenu) {
        fieldTrigger.addEventListener('click', (e) => {
          e.stopPropagation();
          fieldMenu.classList.toggle('hidden');
        });
      }

      // Inbox dropdown (Figma "Request goes to..." selector)
      const inboxTrigger = document.getElementById('inbox-trigger');
      const inboxMenu    = document.getElementById('inbox-menu');
      if (inboxTrigger && inboxMenu) {
        inboxTrigger.addEventListener('click', (e) => {
          e.stopPropagation();
          inboxMenu.classList.toggle('hidden');
        });
        $panelBody.querySelectorAll('.inbox-option').forEach(opt => {
          opt.addEventListener('click', (e) => {
            e.stopPropagation();
            intent.action.inbox = opt.dataset.inboxKey;
            inboxMenu.classList.add('hidden');
            $panelBody.innerHTML = renderIntentBody(intent);
            wirePanelInteractions(intent);
            refreshActionNodeCard(intent);
            markDirty();
          });
        });
      }

      // Call back expectation dropdown — same UX pattern as inbox.
      // "Custom…" reveals an input field below; selecting any preset hides it.
      const callbackTrigger = document.getElementById('callback-trigger');
      const callbackMenu    = document.getElementById('callback-menu');
      const callbackInput   = document.getElementById('callback-custom');
      const callbackLabel   = document.getElementById('callback-trigger-label');
      if (callbackTrigger && callbackMenu) {
        callbackTrigger.addEventListener('click', (e) => {
          e.stopPropagation();
          callbackMenu.classList.toggle('hidden');
        });
        const PRESET_LABELS = {within_1h:'Within 1 hour',within_4h:'Within 4 hours',within_1bd:'Within 1 business day',within_2bd:'Within 2 business days',within_week:'Within the week'};
        $panelBody.querySelectorAll('.callback-option').forEach(opt => {
          opt.addEventListener('click', (e) => {
            e.stopPropagation();
            const key = opt.dataset.callbackKey;
            callbackMenu.classList.add('hidden');
            if (key === 'custom') {
              // Switch to custom input — preserve any existing custom text, default to empty
              const presetKeys = Object.keys(PRESET_LABELS);
              const wasCustom = intent.action.callbackExpectation && !presetKeys.includes(intent.action.callbackExpectation);
              if (!wasCustom) intent.action.callbackExpectation = '';
              if (callbackInput) { callbackInput.classList.remove('hidden'); callbackInput.focus(); }
              if (callbackLabel) callbackLabel.textContent = intent.action.callbackExpectation || 'Custom…';
            } else {
              intent.action.callbackExpectation = key;
              if (callbackInput) { callbackInput.classList.add('hidden'); callbackInput.value = ''; }
              if (callbackLabel) callbackLabel.textContent = PRESET_LABELS[key];
            }
            // Update menu selection styling without a full re-render (preserves focus)
            $panelBody.querySelectorAll('.callback-option').forEach(o => o.classList.remove('bg-stone-50/60','font-medium'));
            opt.classList.add('bg-stone-50/60','font-medium');
            markDirty();
          });
        });
        if (callbackInput) {
          callbackInput.addEventListener('input', () => {
            intent.action.callbackExpectation = callbackInput.value;
            if (callbackLabel) callbackLabel.textContent = callbackInput.value || 'Custom…';
            markDirty();
          });
        }
      }

      // Intake-question checkboxes — unchecking removes from collect
      $panelBody.querySelectorAll('.intake-checkbox[data-field-key]').forEach(cb => {
        cb.addEventListener('change', () => {
          const key = cb.dataset.fieldKey;
          if (!intent.action.collect) intent.action.collect = [];
          if (cb.checked) {
            if (!intent.action.collect.some(f => f.key === key)) {
              intent.action.collect.push({ key, required: true });
            }
          } else {
            intent.action.collect = intent.action.collect.filter(f => f.key !== key);
            $panelBody.innerHTML = renderIntentBody(intent);
            wirePanelInteractions(intent);
          }
          refreshActionNodeCard(intent);
          markDirty();
        });
      });

      // Add new intake field — clicking "Add new" swaps the button for a
      // free-text input where the user types their own question, then commits
      // on Enter or blur. Escape cancels.
      const addIntakeTrigger = document.getElementById('add-intake-trigger');
      const addIntakeInput   = document.getElementById('add-intake-input');
      if (addIntakeTrigger && addIntakeInput) {
        // BUG FIX: Enter calls commit() synchronously, which re-renders the
        // panel and detaches this input. The detached element still fires
        // `blur`, and the deferred blur handler would call commit() a second
        // time — creating a duplicate row with the same label but a fresh
        // Date.now() key. The `done` flag short-circuits any second call.
        let done = false;
        const showInput = () => {
          done = false;
          addIntakeTrigger.classList.add('hidden');
          addIntakeInput.classList.remove('hidden');
          addIntakeInput.value = '';
          setTimeout(() => addIntakeInput.focus(), 0);
        };
        const restore = () => {
          done = true;
          addIntakeInput.classList.add('hidden');
          addIntakeInput.value = '';
          addIntakeTrigger.classList.remove('hidden');
        };
        const commit = () => {
          if (done) return;
          const text = addIntakeInput.value.trim();
          if (!text) { restore(); return; }
          done = true;
          if (!intent.action.collect) intent.action.collect = [];
          intent.action.collect.push({
            key: `custom_${Date.now()}`,
            label: text,
            required: true,
            custom: true,
          });
          $panelBody.innerHTML = renderIntentBody(intent);
          wirePanelInteractions(intent);
          refreshActionNodeCard(intent);
          markDirty();
        };
        addIntakeTrigger.addEventListener('click', (e) => { e.stopPropagation(); showInput(); });
        addIntakeInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); commit(); }
          else if (e.key === 'Escape') { e.preventDefault(); restore(); }
        });
        addIntakeInput.addEventListener('blur', () => {
          // Slight delay so a click elsewhere doesn't race the blur event when committing
          setTimeout(() => { if (!done) commit(); }, 100);
        });
      }

      // Form inputs inside the config — mark dirty on edit
      $panelBody.querySelectorAll('input, textarea, select').forEach(el => {
        el.addEventListener('input', markDirty);
        el.addEventListener('change', markDirty);
      });

      // Schedule capability toggles
      $panelBody.querySelectorAll('.schedule-cap').forEach(cb => {
        cb.addEventListener('change', () => {
          const cap = cb.dataset.cap;
          if (!intent.action.capabilities) intent.action.capabilities = [];
          if (cb.checked) {
            if (!intent.action.capabilities.includes(cap)) intent.action.capabilities.push(cap);
          } else {
            intent.action.capabilities = intent.action.capabilities.filter(c => c !== cap);
          }
          refreshActionNodeCard(intent);
          markDirty();
        });
      });

      // Collapsible sections (intake fields / additional instructions)
      $panelBody.querySelectorAll('.section-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.section;
          const content = $panelBody.querySelector(`[data-section-content="${id}"]`);
          const chevron = btn.querySelector('.section-chevron');
          if (!content) return;
          const willOpen = content.classList.contains('hidden');
          content.classList.toggle('hidden');
          if (chevron) chevron.style.transform = willOpen ? 'rotate(180deg)' : '';
        });
      });

      // Custom intent: trigger signal examples
      $panelBody.querySelectorAll('.trigger-example-input').forEach(input => {
        input.addEventListener('input', () => {
          const idx = parseInt(input.dataset.exampleIdx, 10);
          if (!intent.examples) intent.examples = [];
          intent.examples[idx] = input.value;
          refreshIntentNodeCard(intent);
        });
      });
      $panelBody.querySelectorAll('.trigger-example-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.removeExampleIdx, 10);
          intent.examples.splice(idx, 1);
          $panelBody.innerHTML = renderIntentBody(intent);
          wirePanelInteractions(intent);
          refreshIntentNodeCard(intent);
          markDirty();
        });
      });
      const addEx = document.getElementById('trigger-example-add');
      if (addEx) addEx.addEventListener('click', () => {
        if (!intent.examples) intent.examples = [];
        intent.examples.push('');
        $panelBody.innerHTML = renderIntentBody(intent);
        wirePanelInteractions(intent);
        markDirty();
      });

      // Transfer: multi-number inputs
      $panelBody.querySelectorAll('.transfer-target-input').forEach(input => {
        input.addEventListener('input', () => {
          const idx = parseInt(input.dataset.targetIdx, 10);
          if (!intent.action.targets) intent.action.targets = [];
          intent.action.targets[idx] = input.value;
          // Update canvas card live (without losing input focus)
          refreshActionNodeCard(intent);
        });
      });
      $panelBody.querySelectorAll('.transfer-target-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.removeIdx, 10);
          intent.action.targets.splice(idx, 1);
          refreshActionConfig(intent);
          refreshActionNodeCard(intent);
          markDirty();
        });
      });
      const addBtn = document.getElementById('transfer-add-target');
      if (addBtn) addBtn.addEventListener('click', () => {
        if (!intent.action.targets) intent.action.targets = [];
        intent.action.targets.push('');
        refreshActionConfig(intent);
        markDirty();
      });
    }

    function refreshActionConfig(intent) {
      const $cfg = document.getElementById('action-config');
      if (!$cfg) return;
      $cfg.innerHTML = renderActionConfig(intent.action);
      wirePanelInteractions(intent);
    }

    function refreshActionNodeCard(intent) {
      const $action = document.querySelector(`[data-node-id="action-${intent.id}"]`);
      if (!$action) return;
      // Rebuild just this node
      const oldTop = $action.style.top;
      const newNode = makeActionNode(intent, parseInt(oldTop, 10));
      newNode.classList.add('selected');
      $action.replaceWith(newNode);
    }

    // ============================================================
    // Structured-field operations (used by inline onclick handlers)
    // ============================================================
    function currentOpenIntent() {
      const selected = document.querySelector('.flow-node.selected[data-node-id^="intent-"], .flow-node.selected[data-node-id^="action-"]');
      if (!selected) return null;
      const id = selected.dataset.nodeId.replace(/^(intent|action)-/, '');
      return FLOWS[activeMode].intents.find(i => i.id === id) || null;
    }

    function setFieldRequired(intentId, key, value) {
      const intent = FLOWS[activeMode].intents.find(i => i.id === intentId);
      if (!intent) return;
      const f = (intent.action.collect || []).find(f => f.key === key);
      if (!f) return;
      f.required = (value === 'true');
      markDirty();
      // No re-render needed — the select updated itself.
    }

    function removeField(intentId, key) {
      const intent = FLOWS[activeMode].intents.find(i => i.id === intentId);
      if (!intent) return;
      intent.action.collect = (intent.action.collect || []).filter(f => f.key !== key);
      $panelBody.innerHTML = renderIntentBody(intent);
      wirePanelInteractions(intent);
      markDirty();
    }

    function addField(intentId, key) {
      const intent = FLOWS[activeMode].intents.find(i => i.id === intentId);
      if (!intent) return;
      if (!intent.action.collect) intent.action.collect = [];
      // Don't double-add
      if (intent.action.collect.some(f => f.key === key)) return;
      intent.action.collect.push({ key, required: false });
      $panelBody.innerHTML = renderIntentBody(intent);
      wirePanelInteractions(intent);
      markDirty();
    }

    // Close add-field menu on outside-click
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('add-field-menu');
      const trigger = document.getElementById('add-field-trigger');
      if (!menu || menu.classList.contains('hidden')) return;
      if (menu.contains(e.target) || trigger?.contains(e.target)) return;
      menu.classList.add('hidden');
    });

    // Live character counter for the free-text rider
    // (handlePromptInput defined below — see the canonical version after this block)

    // Close menu on outside-click (single listener, not re-bound)
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('action-dropdown-menu');
      const trigger = document.getElementById('action-dropdown-trigger');
      if (!menu || menu.classList.contains('hidden')) return;
      if (menu.contains(e.target) || trigger?.contains(e.target)) return;
      menu.classList.add('hidden');

    // ============================================================
    // Draft / published state
    // ============================================================
    let isDirty = false;

    function markDirty() {
      persistFlows(); // always persist — keeps localStorage in sync on every edit
      // The green customization dot on the canvas only appears AFTER Save (see
      // panel-save click handler), not during in-flight edits.
      updateSaveDiscardState();
      if (isDirty) return;
      isDirty = true;
      const pill = document.getElementById('draft-pill');
      if (pill) pill.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span> Unsaved changes';
      const btn = document.getElementById('publish-btn');
      if (btn) {
        btn.disabled = false;
        btn.className = 'h-9 text-sm font-medium bg-[#21201d] text-white px-3 rounded-md hover:bg-stone-800 transition leading-5';
      }
    }

    function markPublished() {
      isDirty = false;
      // Reset per-intent baselines so the green customization dots clear
      captureIntentBaselines();
      render();
      const pill = document.getElementById('draft-pill');
      if (pill) pill.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> All published';
      const btn = document.getElementById('publish-btn');
      if (btn) {
        btn.disabled = true;
        btn.className = 'h-9 text-sm font-medium bg-stone-100 text-stone-400 px-3 rounded-md cursor-not-allowed leading-5';
      }
    }

    document.getElementById('panel-save').addEventListener('click', () => {
      if (document.getElementById('panel-save').disabled) return;
      // Refresh the snapshot so this is now the new baseline (re-opening the panel
      // shouldn't immediately show as dirty).
      if (_editingIntent) _editingSnapshot = intentSnapshot(_editingIntent);
      // Saving = commit the change → flip the green customization dot on the node.
      const savedIntent = _activeIntentForActionMenu || _editingIntent;
      if (savedIntent) refreshIntentNodeCard(savedIntent);
      markDirty();
      closePanel();
    });
    document.getElementById('panel-discard').addEventListener('click', () => {
      if (document.getElementById('panel-discard').disabled) return;
      discardPanelChanges();
    });
    const publishBtn = document.getElementById('publish-btn');
    if (publishBtn) publishBtn.addEventListener('click', () => { if (!publishBtn.disabled) markPublished(); });

    function freshActionDefaults(type, prev = {}) {
      const base = { type };
      if (type === 'transfer') return { ...base, targets: prev.targets || (prev.target ? [prev.target] : ['(415) 555-0000']) };
      if (type === 'message')  return {
        ...base,
        collect: prev.collect || [
          { key: 'caller_name',     required: true  },
          { key: 'callback_number', required: true  },
          { key: 'reason_brief',    required: false },
        ],
        prompt: prev.prompt || '',
        inbox:  prev.inbox  || 'front_desk',
      };
      if (type === 'schedule') return { ...base, capabilities: prev.capabilities || ['book', 'reschedule'] };
      return base;
    }

    document.getElementById('panel-close').addEventListener('click', closePanel);
    document.getElementById('panel-cancel').addEventListener('click', closePanel);
    function closePanel() {
      $sidePanel.classList.add('hidden');
      selectedNodeId = null;
      // Clear the per-intent edit snapshot so the next openIntentPanel takes
      // a fresh one and Save/Discard reset to disabled.
      _editingIntent = null;
      _editingSnapshot = null;
      render();
    }

    // Delete the currently open intent from the active mode.
    // Welcome node is not deletable (skip cleanly).
    document.getElementById('panel-delete').addEventListener('click', () => {
      if (!selectedNodeId || !selectedNodeId.startsWith('intent-')) return;
      const intentId = selectedNodeId.slice('intent-'.length);
      const intent = FLOWS[activeMode].intents.find(i => i.id === intentId);
      if (!intent) return;
      if (!confirm(`Delete the "${intent.name}" intent? This affects the "${shortModeLabel(FLOWS[activeMode].label)}" time block only.`)) return;
      FLOWS[activeMode].intents = FLOWS[activeMode].intents.filter(i => i.id !== intentId);
      // Clear any dismissed-warning state for this intent
      dismissedHashes.delete(intentId);
      markDirty();
      closePanel();
    });

    // ============================================================
    // Time-block dropdown (header)
    // 24/7 is the default, always-on mode. Lunch/After hours/etc. are
    // custom overrides — the user can add more via "+ Add time block".
    // ============================================================
    const $modeTrigger = document.getElementById('mode-trigger');
    const $modeMenu = document.getElementById('mode-menu');
    const $modeOptions = document.getElementById('mode-options');

    function renderModeOptions() {
      const keys = Object.keys(FLOWS);
      $modeOptions.innerHTML = keys.map(key => {
        const flow = FLOWS[key];
        const isActive = key === activeMode;
        const [primary, ...rest] = (flow.label || '').split('·');
        const subtitle = rest.join('·').trim();
        return `
          <button data-mode="${key}" class="mode-option w-full text-left px-3 py-2 hover:bg-stone-50 flex items-center gap-2.5 ${isActive ? 'bg-stone-50/70' : ''}">
            <span class="w-1.5 h-1.5 rounded-full ${modeDotClass(key)} shrink-0"></span>
            <div class="flex-1 min-w-0">
              <div class="text-sm text-stone-900">${primary.trim()}</div>
              ${subtitle ? `<div class="text-xs text-stone-500 truncate">${subtitle}</div>` : ''}
            </div>
            ${isActive ? `<span class="text-stone-900 w-3.5 h-3.5 inline-flex items-center justify-center">${ICON_SVG.check}</span>` : ''}
          </button>
        `;
      }).join('');
      $modeOptions.querySelectorAll('.mode-option').forEach(btn => {
        btn.addEventListener('click', () => {
          activeMode = btn.dataset.mode;
          $modeMenu.classList.add('hidden');
          closePanel();
          render();
        });
      });
    }

    if ($modeTrigger && $modeMenu) {
      $modeTrigger.addEventListener('click', (e) => {
        e.stopPropagation();
        renderModeOptions();
        $modeMenu.classList.toggle('hidden');
      });
      document.addEventListener('click', (e) => {
        if ($modeMenu.classList.contains('hidden')) return;
        if ($modeMenu.contains(e.target) || $modeTrigger.contains(e.target)) return;
        $modeMenu.classList.add('hidden');
      });
    }

    const $addTimeBlock = document.getElementById('add-time-block');
    if ($addTimeBlock) {
      $addTimeBlock.addEventListener('click', (e) => {
        e.stopPropagation();
        const name = window.prompt('Name this time block (e.g., "Saturday morning")');
        if (!name) return;
        const id = `block_${Date.now()}`;
        // Seed the new block from the current 24/7 default so the user has something to override.
        FLOWS[id] = {
          label: `${name} · custom block`,
          custom: true,
          intents: JSON.parse(JSON.stringify(FLOWS['business'].intents)),
        };
        activeMode = id;
        $modeMenu.classList.add('hidden');
        markDirty();
        closePanel();
        render();
      });
    }

    const $drawer = document.getElementById('test-drawer');
    const $drawerIcon = document.getElementById('test-toggle-icon');

    // ============================================================
    // Real-LLM test drawer — uses the backend /api/chat endpoint
    // which composes the actual production system prompt + this
    // intent's structured fields + rider, then calls Claude.
    // ============================================================
    const testState = {
      intentId: null,
      messages: [],
    };

    function currentTestIntent() {
      return FLOWS[activeMode].intents.find(i => i.id === testState.intentId);
    }

    function renderIntentPicker() {
      const $picker = document.getElementById('test-intent-picker');
      $picker.innerHTML = FLOWS[activeMode].intents.map(i => `
        <button data-intent-id="${i.id}" class="test-intent-btn w-full text-left px-2.5 py-1.5 rounded text-sm flex items-center gap-2 ${i.id === testState.intentId ? 'bg-stone-900 text-white' : 'hover:bg-stone-50 text-stone-700'}">
          <span class="w-1.5 h-1.5 rounded-full ${i.id === testState.intentId ? 'bg-white' : (i.custom ? 'bg-purple-500' : 'bg-stone-400')}"></span>
          <span class="truncate">${i.name}</span>
        </button>
      `).join('');
      $picker.querySelectorAll('.test-intent-btn').forEach(b => {
        b.addEventListener('click', () => {
          testState.intentId = b.dataset.intentId;
          renderIntentPicker();
          resetTestConversation();
        });
      });
    }

    function resetTestConversation() {
      testState.messages = [];
      const intent = currentTestIntent();
      document.getElementById('test-transcript').innerHTML = intent
        ? `<div class="text-xs text-stone-400 italic">Testing <strong>${intent.name}</strong> (${intent.action.type}). Type as the caller below. The agent's response uses the real production system prompt + your draft config.</div>`
        : '';
    }

    function appendTestMessage(role, content, opts) {
      opts = opts || {};
      const $t = document.getElementById('test-transcript');
      const wrapper = document.createElement('div');
      wrapper.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';
      const bubble = document.createElement('div');
      bubble.className = role === 'user'
        ? 'bg-stone-900 text-white text-sm px-3 py-2 rounded-2xl rounded-tr-sm max-w-md whitespace-pre-wrap'
        : 'bg-stone-100 text-stone-900 text-sm px-3 py-2 rounded-2xl rounded-tl-sm max-w-md whitespace-pre-wrap';
      bubble.textContent = content;
      if (opts.thinking) bubble.classList.add('italic', 'text-stone-500');
      wrapper.appendChild(bubble);
      $t.appendChild(wrapper);
      $t.scrollTop = $t.scrollHeight;
      return wrapper;
    }

    document.getElementById('test-input-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const intent = currentTestIntent();
      if (!intent) return;
      const input = document.getElementById('test-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.disabled = true;

      testState.messages.push({ role: 'user', content: text });
      appendTestMessage('user', text);
      const thinkingEl = appendTestMessage('assistant', 'Thinking…', { thinking: true });

      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            intent,
            messages: testState.messages,
            fieldLibrary: FIELD_LIBRARY,
          }),
        });
        const raw = await resp.text();
        let data;
        try {
          data = JSON.parse(raw);
        } catch {
          thinkingEl.remove();
          appendTestMessage('assistant', `Server returned non-JSON (status ${resp.status}):\n${raw.substring(0, 500)}`);
          return;
        }
        thinkingEl.remove();
        if (data.error) {
          appendTestMessage('assistant', 'Error: ' + data.error);
        } else {
          testState.messages.push({ role: 'assistant', content: data.reply });
          appendTestMessage('assistant', data.reply);
        }
      } catch (err) {
        thinkingEl.remove();
        appendTestMessage('assistant', 'Network error: ' + err.message);
      } finally {
        input.disabled = false;
        input.focus();
      }
    });

    document.getElementById('test-reset').addEventListener('click', () => {
      resetTestConversation();
    });

    document.getElementById('test-show-prompt').addEventListener('click', async () => {
      const intent = currentTestIntent();
      if (!intent) return;
      try {
        const resp = await fetch('/api/compose', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ intent, fieldLibrary: FIELD_LIBRARY }),
        });
        const data = await resp.json();
        const overlay = document.createElement('div');
        overlay.className = 'fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-8';
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
        const box = document.createElement('div');
        box.className = 'bg-white rounded-xl w-full max-w-3xl flex flex-col';
        box.style.height = '85vh';
        box.innerHTML = `
          <div class="px-5 py-4 border-b border-stone-100 flex items-center justify-between">
            <div>
              <div class="text-sm font-medium text-stone-900">Composed system prompt</div>
              <div class="text-xs text-stone-500 mt-0.5">Real production template + per-intent overlay for "${intent.name}"</div>
            </div>
            <button class="text-stone-400 hover:text-stone-900 text-xl leading-none" aria-label="Close">×</button>
          </div>
          <pre class="flex-1 overflow-auto p-4 text-xs whitespace-pre-wrap" style="font-family:'JetBrains Mono',ui-monospace,monospace"></pre>
        `;
        box.querySelector('button').addEventListener('click', () => overlay.remove());
        box.querySelector('pre').textContent = data.prompt || data.error || '(no prompt)';
        overlay.appendChild(box);
        document.body.appendChild(overlay);
      } catch (err) {
        alert('Failed to load prompt: ' + err.message);
      }
    });

    document.getElementById('test-toggle').addEventListener('click', () => {
      const wasCollapsed = $drawer.classList.contains('collapsed');
      if (wasCollapsed) {
        openTestDrawer();
      } else {
        $drawer.classList.add('collapsed');
        $drawerIcon.textContent = '▴';
      }
    });

    function openTestDrawer(intentId) {
      const allIntents = FLOWS[activeMode].intents;
      // Pick: provided id → currently-open side-panel intent → first
      const sidePanelSelected = document.querySelector('.flow-node.selected[data-node-id^="intent-"], .flow-node.selected[data-node-id^="action-"]');
      const selectedId = sidePanelSelected ? sidePanelSelected.dataset.nodeId.replace(/^(intent|action)-/, '') : null;
      const candidate = intentId || selectedId || (allIntents[0] && allIntents[0].id);
      if (!allIntents.find(i => i.id === candidate)) {
        testState.intentId = allIntents[0] ? allIntents[0].id : null;
      } else {
        testState.intentId = candidate;
      }
      renderIntentPicker();
      resetTestConversation();
      $drawer.classList.remove('collapsed');
      $drawerIcon.textContent = '▾';
      setTimeout(() => document.getElementById('test-input').focus(), 100);
    }

    document.getElementById('open-test').addEventListener('click', () => openTestDrawer());

    render();

    // ============================================================
    // Canvas zoom & pan (Figma-style)
    // ============================================================
    const $viewport = document.getElementById('canvas-viewport');
    const $transform = document.getElementById('canvas-transform');
    const $zoomPct = document.getElementById('zoom-pct');
    let zoom = 1;
    let panX = 0;
    let panY = 0;
    const ZOOM_MIN = 0.25;
    const ZOOM_MAX = 2;

    function applyTransform() {
      $transform.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
      $zoomPct.textContent = `${Math.round(zoom * 100)}%`;
    }

    // Promote the canvas to a composited layer only while the user is actively
    // panning/zooming. After 200ms of stillness, drop the will-change so the
    // browser re-rasterizes the layer at the new scale → crisp text and lines.
    let interactingTimer = null;
    function markInteracting() {
      $transform.classList.add('interacting');
      if (interactingTimer) clearTimeout(interactingTimer);
      interactingTimer = setTimeout(() => $transform.classList.remove('interacting'), 200);
    }

    // Wheel: zoom centered on the cursor by default. Hold shift to pan with the wheel.
    $viewport.addEventListener('wheel', (e) => {
      e.preventDefault();
      markInteracting();
      if (e.shiftKey) {
        // Shift+wheel pans (mouse users without a trackpad / horizontal scroll)
        panX -= e.deltaX || e.deltaY;
        panY -= e.shiftKey ? 0 : e.deltaY;
      } else {
        const rect = $viewport.getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const cy = e.clientY - rect.top;
        const oldZoom = zoom;
        // Trackpad pinch sends a larger deltaY with ctrlKey; mouse wheel sends ~100 increments.
        // Normalize by clamping so a single notch doesn't slingshot you to the zoom limit.
        const rawDelta = -e.deltaY;
        const delta = Math.max(-0.25, Math.min(0.25, rawDelta * 0.005));
        zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoom * (1 + delta)));
        const k = zoom / oldZoom;
        panX = cx - (cx - panX) * k;
        panY = cy - (cy - panY) * k;
      }
      applyTransform();
    }, { passive: false });

    // Drag on empty canvas to pan
    let isDragging = false;
    let lastX = 0, lastY = 0;
    $viewport.addEventListener('mousedown', (e) => {
      // Bail if clicking on a node, button, or any UI chrome
      if (e.target.closest('.flow-node') || e.target.closest('button') || e.target.closest('#side-panel') || e.target.closest('#test-drawer') || e.target.closest('#add-intent-dropdown')) return;
      isDragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
      $viewport.style.cursor = 'grabbing';
      e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      panX += e.clientX - lastX;
      panY += e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      markInteracting();
      applyTransform();
    });
    window.addEventListener('mouseup', () => {
      if (isDragging) { isDragging = false; $viewport.style.cursor = ''; }
    });

    function zoomBy(factor) {
      const rect = $viewport.getBoundingClientRect();
      const cx = rect.width / 2;
      const cy = rect.height / 2;
      const oldZoom = zoom;
      zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoom * factor));
      const k = zoom / oldZoom;
      panX = cx - (cx - panX) * k;
      panY = cy - (cy - panY) * k;
      markInteracting();
      applyTransform();
    }

    document.getElementById('zoom-in').addEventListener('click', () => zoomBy(1.2));
    document.getElementById('zoom-out').addEventListener('click', () => zoomBy(1 / 1.2));
    document.getElementById('zoom-reset').addEventListener('click', () => {
      zoom = 1; panX = 0; panY = 0;
      applyTransform();
    });

    // Lightweight prompt-input handler — just keeps the counter live
    // and lets the model state mirror what's in the textarea.
    // (Drag/draft state is managed by the simple isDirty flag in markDirty/markPublished above.)
    function handlePromptInput(textarea) {
      const intentId = textarea.dataset.intentId;
      const intent = FLOWS[activeMode].intents.find(i => i.id === intentId);
      if (!intent) return;
      intent.action.prompt = textarea.value;
      const counter = document.getElementById('prompt-counter');
      if (counter) {
        const len = textarea.value.length;
        counter.textContent = `${len}/${PROMPT_LIMIT}`;
        counter.className = `text-xs tabular-nums leading-[16px] ${len > 400 ? 'text-amber-600' : 'text-[#8e8c88]'}`;
      }
      const ph = document.getElementById('prompt-placeholder');
      if (ph) ph.classList.toggle('hidden', textarea.value.length > 0);
      // Debounce the capability check (~600ms after last keystroke)
      scheduleProseClassify(intentId, textarea.value);
      // Repaint the canvas action card so the customization tint reflects the current state
      refreshActionNodeCard(intent);
      markDirty();
    }

    // ============================================================
    // Capability-warning render pipeline.
    //   • Debounce 600ms after user stops typing
    //   • Render synchronously (regex classify is local; no AI call)
    //   • Dismiss is in-memory per (intentId, prose hash) — pose change clears it
    //   • Never blocks save; absence is acceptable
    // ============================================================
    let proseClassifyTimer = null;

    function scheduleProseClassify(intentId, text) {
      if (proseClassifyTimer) clearTimeout(proseClassifyTimer);
      proseClassifyTimer = setTimeout(() => renderProseWarning(intentId, text), 600);
    }

    function renderProseWarning(intentId, text) {
      const slot = document.querySelector(`#prose-warning-slot[data-intent-id="${intentId}"]`);
      if (!slot) return;
      const hash = hashProse(text || '');
      const dismissedSet = dismissedHashes.get(intentId) || new Set();
      if (dismissedSet.has(hash) || !text || !text.trim()) { slot.innerHTML = ''; return; }
      const violations = classifyProse(text);
      if (violations.length === 0) { slot.innerHTML = ''; return; }

      // Figma 33:1596 — amber inline alert (no shadow, no heading, just body + dismiss).
      // Multiple violations stack as separate alert cards so each card matches the spec
      // exactly. Each card is individually dismissable.
      slot.innerHTML = `<div class="flex flex-col gap-2">${violations.map((v, i) => `
        <div class="warning-card flex items-center gap-2 pl-3 pr-2 py-3 rounded-md"
             data-violation-idx="${i}"
             style="background: rgba(167, 109, 0, 0.08); border: 0.5px solid rgba(167, 109, 0, 0.2);">
          <span class="inline-flex items-center justify-center shrink-0" style="width:20px;height:20px;color:#a76d00;">
            <svg viewBox="0 0 256 256" width="20" height="20" fill="currentColor" aria-hidden="true">
              <path d="M236.8 188.09L149.35 36.22a24.76 24.76 0 0 0-42.7 0L19.2 188.09a23.51 23.51 0 0 0 0 23.72A24.35 24.35 0 0 0 40.55 224h174.9a24.35 24.35 0 0 0 21.33-12.19 23.51 23.51 0 0 0 .02-23.72ZM120 104a8 8 0 0 1 16 0v40a8 8 0 0 1-16 0Zm8 88a12 12 0 1 1 12-12 12 12 0 0 1-12 12Z"/>
            </svg>
          </span>
          <span class="flex-1 leading-[18px]" style="font-size:14px;font-weight:400;color:#21201d;">${v.issue}</span>
          <button class="prose-warning-dismiss inline-flex items-center justify-center shrink-0 rounded-md hover:bg-black/5 transition"
                  data-violation-idx="${i}"
                  style="width:28px;height:28px;padding:4px;color:#21201d;"
                  aria-label="Dismiss">
            <svg width="16" height="16" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
              <line x1="200" y1="56"  x2="56"  y2="200"/>
              <line x1="200" y1="200" x2="56"  y2="56"/>
            </svg>
          </button>
        </div>
      `).join('')}</div>`;

      // Dismiss = hide all warnings for the current prose hash. (Per-card dismiss would
      // require tracking dismissals at sub-hash granularity; the locked-in behavior is
      // "dismiss until prose changes", so one click hides everything for this state.)
      slot.querySelectorAll('.prose-warning-dismiss').forEach(btn => {
        btn.addEventListener('click', () => {
          if (!dismissedHashes.has(intentId)) dismissedHashes.set(intentId, new Set());
          dismissedHashes.get(intentId).add(hash);
          slot.innerHTML = '';
        });
      });
    }

    // Run classification immediately when an intent panel opens with existing prose
    // (so violations on already-saved instructions show up without typing).
    const _origOpenIntentPanel = openIntentPanel;
    openIntentPanel = function (intentId) {
      _origOpenIntentPanel(intentId);
      const intent = FLOWS[activeMode].intents.find(i => i.id === intentId);
      if (intent?.action?.type === 'message') {
        // Defer to next tick so the slot is in the DOM
        setTimeout(() => renderProseWarning(intent.id, intent.action.prompt || ''), 0);
      }
    };
  </script>

</body>
</html>
